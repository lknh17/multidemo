<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>V25 - 端到端广告管线：代码讲解</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0e1a;color:#e0e0e0;font-family:-apple-system,sans-serif}.header{height:64px;background:linear-gradient(135deg,#1a1e2e,#2a2e3e);display:flex;align-items:center;padding:0 24px;border-bottom:1px solid #333}.badge{background:linear-gradient(135deg,#ff5722,#ffc107);padding:4px 12px;border-radius:12px;font-size:13px;font-weight:700;margin-right:12px}.title{font-size:18px;font-weight:600;flex:1}.page-type{font-size:13px;color:#aaa;background:#1a1e2e;padding:4px 12px;border-radius:8px}.dots{display:flex;gap:6px;margin-left:16px}.dot{width:10px;height:10px;border-radius:50%;background:#333;cursor:pointer;transition:all .3s}.dot.active{background:#ff5722}.dot.done{background:#ffc107}.main{display:flex;height:calc(100vh - 136px)}.code-panel{flex:4;padding:16px;overflow-y:auto;background:#0d1117;font-family:monospace;font-size:13px;line-height:1.6}.code-line{padding:2px 8px;border-radius:3px;white-space:pre}.code-line.highlight{background:#ff572222;border-left:3px solid #ff5722}.canvas-area{flex:6;position:relative;display:flex;align-items:center;justify-content:center;background:#111827}canvas{border-radius:8px}.info-box{position:absolute;bottom:16px;left:16px;right:16px;background:#1a1e2eee;border:1px solid #333;border-radius:8px;padding:12px}.info-title{font-size:14px;font-weight:700;color:#ff5722;margin-bottom:4px}.info-text{font-size:13px;color:#ccc}.controls{height:72px;background:#111827;display:flex;align-items:center;justify-content:center;gap:16px;border-top:1px solid #222}.btn{padding:10px 24px;border:1px solid #555;border-radius:8px;background:transparent;color:#e0e0e0;cursor:pointer;font-size:14px;transition:all .2s}.btn:hover{border-color:#ff5722}.btn:disabled{opacity:.3}.step-counter{font-size:16px;font-weight:600;min-width:100px;text-align:center}</style></head>
<body>
<div class="header"><span class="badge">V25 Capstone</span><span class="title">端到端广告多模态管线</span><span class="page-type">代码讲解</span><div class="dots" id="dots"></div></div>
<div class="main"><div class="code-panel" id="codePanel"></div><div class="canvas-area"><canvas id="canvas"></canvas><div class="info-box"><div class="info-title" id="infoTitle"></div><div class="info-text" id="infoText"></div></div></div></div>
<div class="controls"><button class="btn" id="prevBtn" onclick="prevStep()">◀ 上一步</button><div class="step-counter" id="stepCounter"></div><button class="btn" id="nextBtn" onclick="nextStep()">下一步 ▶</button><button class="btn" onclick="replay()">↻ 重播</button></div>
<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');let W,H,currentStep=0,animProgress=0,animId=null;
function resize(){const a=document.querySelector('.canvas-area');W=canvas.width=a.clientWidth-40;H=canvas.height=a.clientHeight-120}window.addEventListener('resize',resize);resize();
function RR(x,y,w,h,r,f,s){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();if(f){ctx.fillStyle=f;ctx.fill()}if(s){ctx.strokeStyle=s;ctx.stroke()}}
function arr(x1,y1,x2,y2,c='#555'){ctx.strokeStyle=c;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}
function txt(t,x,y,c='#aaa',s=12){ctx.fillStyle=c;ctx.font=s+'px sans-serif';ctx.textAlign='center';ctx.fillText(t,x,y)}

const steps=[
{title:"AdEncoder.forward",info:"三路编码 → 注意力融合 → L2 归一化，输出统一 embedding",
code:[{text:'def forward(self, images, text_ids, audio_feats):',hl:true},{text:'    # 1. 三路独立编码',hl:true},{text:'    vis = self.encode_visual(images)    # ViT CLS',hl:false},{text:'    txt = self.encode_text(text_ids)    # Mean Pool',hl:false},{text:'    aud = self.encode_audio(audio_feats) # MLP',hl:false},{text:'    ',hl:false},{text:'    # 2. 拼接为 KV 序列',hl:true},{text:'    kv = cat([vis, txt, aud], dim=1)  # [B,3,D]',hl:false},{text:'    ',hl:false},{text:'    # 3. 注意力融合',hl:true},{text:'    query = self.fusion_query  # [1,1,D]',hl:false},{text:'    fused = cross_attn(query, kv, kv)',hl:false},{text:'    fused = norm(fused + query)',hl:false},{text:'    ',hl:false},{text:'    # 4. 投影 + L2 归一化',hl:true},{text:'    return F.normalize(self.proj(fused))',hl:false}],
render(p){ctx.clearRect(0,0,W,H);const cx=W/2;
const blocks=[{n:'Image→ViT',c:'#ff5722'},{n:'Text→Transformer',c:'#ffc107'},{n:'Audio→MLP',c:'#00e5ff'}];
blocks.forEach((b,i)=>{const y=20+i*35;const alpha=Math.min(1,p*4-i*0.5);if(alpha<=0)return;ctx.globalAlpha=alpha;RR(10,y,120,28,4,'#1a1e2e',b.c);txt(b.n,70,y+18,b.c,10);if(p>0.3){arr(135,y+14,170,y+14,b.c);RR(175,y+2,50,24,3,b.c+'33',b.c);txt('e_'+['v','t','a'][i],200,y+18,'#fff',9)}ctx.globalAlpha=1});
if(p>0.5){blocks.forEach((_,i)=>{arr(230,34+i*35,260,75,b='#555')});RR(265,55,100,40,6,'#e040fb22','#e040fb');txt('CrossAttn',315,70,'#e040fb',10);txt('Fusion',315,85,'#888',9)}
if(p>0.8){arr(370,75,400,75,'#e040fb');RR(405,60,80,30,4,'#ffc10733','#ffc107');txt('L2 Norm',445,80,'#ffc107',10)}}},

{title:"AdMatcher.retrieve + rerank",info:"两阶段检索：ANN 快速召回 → 交叉注意力精排",
code:[{text:'def retrieve(self, q_emb, index_embs, top_k):',hl:true},{text:'    scores = q_emb @ index_embs.T',hl:false},{text:'    top_scores, top_idx = scores.topk(k)',hl:true},{text:'    return top_idx, top_scores',hl:false},{text:'',hl:false},{text:'def rerank(self, q_emb, candidate_embs):',hl:true},{text:'    q = self.cross_proj_q(q_emb)  # [B,1,D]',hl:false},{text:'    d = self.cross_proj_d(candidates)',hl:false},{text:'    cross = cross_attn(q, d, d)',hl:true},{text:'    scores = self.score_head(cross)',hl:false},{text:'    return scores',hl:false}],
render(p){ctx.clearRect(0,0,W,H);const cx=W/2;
// Stage 1: Retrieve
RR(10,10,130,30,4,'#1a1e2e','#ff5722');txt('Stage 1: Recall',75,30,'#ff5722',11);
if(p>0.2){RR(10,50,55,20,3,'#ff572233','#ff5722');txt('Query',37,64,'#ff5722',9);
RR(75,50,65,20,3,'#1a1e2e','#aaa');txt('Index',107,64,'#aaa',9);
arr(37,75,37,90,'#555');arr(107,75,107,90,'#555');
RR(40,95,100,20,3,'#ffc10733','#ffc107');txt('TopK=100',90,109,'#ffc107',9)}
// Stage 2: Rerank
if(p>0.5){RR(160,10,130,30,4,'#1a1e2e','#00e5ff');txt('Stage 2: Rerank',225,30,'#00e5ff',11);
RR(160,50,130,55,4,'#00e5ff22','#00e5ff');txt('CrossEncoder',225,70,'#00e5ff',10);txt('Query × Candidates',225,85,'#888',9);txt('→ Score each',225,98,'#888',9)}
if(p>0.8){arr(225,110,225,130,'#00e5ff');RR(175,135,100,20,3,'#ffc10733','#ffc107');txt('TopK=20',225,149,'#ffc107',9)}}},

{title:"CTRPredictor.forward",info:"FM 二阶交叉 + DNN 深层非线性 → σ(FM + DNN)",
code:[{text:'def forward(self, user_emb, ad_emb, ctx_emb):',hl:true},{text:'    combined = cat([user, ad, ctx], dim=-1)',hl:false},{text:'',hl:false},{text:'    # FM: 二阶特征交叉',hl:true},{text:'    linear = self.fm.linear(combined)',hl:false},{text:'    sq_sum = (combined @ V)²',hl:false},{text:'    sum_sq = (combined²) @ (V²)',hl:false},{text:'    fm_out = linear + 0.5*(sq_sum - sum_sq)',hl:true},{text:'',hl:false},{text:'    # DNN: 深层非线性交互',hl:true},{text:'    dnn_out = self.dnn(combined)',hl:false},{text:'',hl:false},{text:'    # 融合预测',hl:true},{text:'    ctr = sigmoid(fm_out + dnn_out)',hl:false},{text:'    return ctr  # ∈ [0, 1]',hl:false}],
render(p){ctx.clearRect(0,0,W,H);
// FM visualization
if(p>0.2){RR(10,10,130,25,4,'#1a1e2e','#ff5722');txt('FM Layer',75,27,'#ff5722',11);
// Feature crosses
const feats=['u₁','u₂','a₁','a₂','c₁'];
feats.forEach((f,i)=>{const x=20+i*26,y=45;const alpha=Math.min(1,(p-0.2)*4);ctx.globalAlpha=alpha;RR(x,y,22,18,2,'#ff572233','#ff5722');txt(f,x+11,y+13,'#ff5722',8);ctx.globalAlpha=1});
if(p>0.4){txt('⟨vᵢ,vⱼ⟩ 交叉',75,80,'#ffc107',10);
ctx.strokeStyle='#ffc10744';ctx.lineWidth=1;for(let i=0;i<3;i++)for(let j=i+1;j<5;j++){ctx.beginPath();ctx.moveTo(31+i*26,65);ctx.lineTo(31+j*26,65);ctx.stroke()}}}
// DNN visualization
if(p>0.5){RR(160,10,130,25,4,'#1a1e2e','#00e5ff');txt('DNN',225,27,'#00e5ff',11);
const layers=[{w:100,n:5},{w:70,n:4},{w:40,n:3},{w:20,n:2}];
layers.forEach((l,li)=>{const y=45+li*25;for(let n=0;n<l.n;n++){const x=225-l.w/2+n*(l.w/(l.n-1||1));const alpha=Math.min(1,(p-0.5)*4-li*0.2);ctx.globalAlpha=Math.max(0,alpha);ctx.fillStyle='#00e5ff';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}})}
// Output
if(p>0.85){txt('σ(FM + DNN) = CTR',W/2,H-20,'#ffc107',12)}}},

{title:"MultiObjectiveRanker.forward",info:"四路评分头 + softmax 加权 → 多目标最终排序分",
code:[{text:'def forward(self, user_emb, ad_emb, ctx_emb):',hl:true},{text:'    features = cat([user, ad, ctx])',hl:false},{text:'',hl:false},{text:'    ctr   = self.ctr_head(features)',hl:true},{text:'    rel   = self.relevance_head(features)',hl:false},{text:'    div   = self.diversity_head(features)',hl:false},{text:'    fresh = self.freshness_head(features)',hl:false},{text:'',hl:false},{text:'    # 可学习权重 softmax 归一化',hl:true},{text:'    w = softmax(self.weights)',hl:false},{text:'    scores = stack([ctr, rel, div, fresh])',hl:false},{text:'    final = (scores * w).sum(dim=-1)',hl:true},{text:'',hl:false},{text:'    return final, {ctr, rel, div, fresh, w}',hl:false}],
render(p){ctx.clearRect(0,0,W,H);const cx=W/2;
const heads=[{n:'CTR',c:'#ff5722',w:0.4},{n:'Relevance',c:'#ffc107',w:0.3},{n:'Diversity',c:'#00e5ff',w:0.2},{n:'Freshness',c:'#e040fb',w:0.1}];
// Input
RR(10,H/2-15,80,30,4,'#1a1e2e','#aaa');txt('Features',50,H/2+5,'#aaa',10);
heads.forEach((h,i)=>{const y=15+i*(H-30)/4;const alpha=Math.min(1,p*3-i*0.4);if(alpha<=0)return;ctx.globalAlpha=alpha;
arr(95,H/2,130,y+12,h.c+'88');RR(135,y,90,25,4,h.c+'22',h.c);txt(h.n,180,y+16,h.c,10);
if(p>0.5){arr(230,y+12,260,y+12,h.c);const bw=h.w*80;RR(265,y+2,bw,20,3,h.c+'44',h.c);txt(`w=${h.w}`,265+bw+25,y+16,'#888',9)}ctx.globalAlpha=1});
if(p>0.8){heads.forEach((h,i)=>{const y=15+i*(H-30)/4;arr(265+h.w*80,y+12,cx+80,H/2,'#555')});
RR(cx+70,H/2-15,80,30,6,'#ffc10733','#ffc107');txt('Σ wᵢ·sᵢ',cx+110,H/2+5,'#ffc107',11)}}},

{title:"OnlineLearner.update",info:"单样本梯度更新 + EMA 平滑，实时适应数据分布漂移",
code:[{text:'def update(self, user, ad, ctx, click):',hl:true},{text:'    # 1. 前向 + 计算损失',hl:true},{text:'    pred = self.model(user, ad, ctx)',hl:false},{text:'    loss = BCE(pred, click)',hl:false},{text:'',hl:false},{text:'    # 2. 反向传播 + 梯度裁剪',hl:true},{text:'    loss.backward()',hl:false},{text:'    clip_grad_norm_(params, 1.0)',hl:false},{text:'    self.optimizer.step()',hl:false},{text:'',hl:false},{text:'    # 3. EMA 参数平滑',hl:true},{text:'    for ema_p, p in zip(ema, model):',hl:false},{text:'        ema_p = β·ema_p + (1-β)·p',hl:true},{text:'',hl:false},{text:'    self.step_count += 1',hl:false}],
render(p){ctx.clearRect(0,0,W,H);const cx=W/2;
// Timeline
ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(20,H/2);ctx.lineTo(W-20,H/2);ctx.stroke();
txt('时间 →',W-40,H/2-10,'#aaa',10);
// Data stream
const n=12;for(let i=0;i<n;i++){const x=40+i*(W-80)/n;const prog=Math.min(1,p*n/(i+1));if(prog<=0)continue;ctx.globalAlpha=prog;
const isClick=i%3===0;ctx.fillStyle=isClick?'#4caf50':'#ff4444';ctx.beginPath();ctx.arc(x,H/2,6,0,Math.PI*2);ctx.fill();txt(isClick?'✓':'✗',x,H/2-15,isClick?'#4caf50':'#ff4444',9);
// Loss curve
if(i>0){const loss=0.7-i*0.04+Math.sin(i)*0.05;const y=H/2+50-loss*60;const prevLoss=0.7-(i-1)*0.04+Math.sin(i-1)*0.05;const py=H/2+50-prevLoss*60;const prevX=40+(i-1)*(W-80)/n;ctx.strokeStyle='#ffc107';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(prevX,py);ctx.lineTo(x,y);ctx.stroke();if(i===n-1){txt('Loss ↓',x+20,y,'#ffc107',10)}}ctx.globalAlpha=1}
// EMA label
if(p>0.7){txt('EMA β=0.999: θ̄ = β·θ̄ + (1-β)·θ',cx,30,'#00e5ff',12);txt('在线数据流 → 实时更新 → 收敛',cx,H-20,'#ffc107',11)}}},

{title:"E2EAdPipeline.forward",info:"全管线：encode → retrieve → rerank → safety → quality → serve",
code:[{text:'def forward(self, q_img, q_txt, ad_img, ad_txt):',hl:true},{text:'    # Stage 1: Encode',hl:true},{text:'    q_emb = self.encoder(q_img, q_txt)',hl:false},{text:'    ad_emb = self.encoder(ad_img, ad_txt)',hl:false},{text:'',hl:false},{text:'    # Stage 2-3: Retrieve + Rerank',hl:true},{text:'    idx, recall, rerank = matcher(q, ad)',hl:false},{text:'',hl:false},{text:'    # Stage 4: Safety Filter',hl:true},{text:'    safe = self.safety_filter(ad_emb)',hl:false},{text:'',hl:false},{text:'    # Stage 5: Quality Gate',hl:true},{text:'    quality = self.quality_gate(ad_emb)',hl:false},{text:'',hl:false},{text:'    # Stage 6: Contrastive Loss',hl:true},{text:'    loss = InfoNCE(q_emb, ad_emb) / τ',hl:false},{text:'    return {emb, scores, masks, loss}',hl:false}],
render(p){ctx.clearRect(0,0,W,H);
// Pipeline stages as horizontal flow
const stages=[{n:'Encode',c:'#ff5722'},{n:'Retrieve',c:'#ffc107'},{n:'Rerank',c:'#00e5ff'},{n:'Safety',c:'#e040fb'},{n:'Quality',c:'#4caf50'},{n:'Serve',c:'#ff9800'}];
const sw=70,gap=(W-stages.length*sw)/(stages.length+1);
stages.forEach((s,i)=>{const x=gap+i*(sw+gap);const alpha=Math.min(1,p*(stages.length+1)/(i+1));if(alpha<=0)return;
ctx.globalAlpha=alpha;RR(x,H/2-20,sw,40,6,s.c+'33',s.c);txt(s.n,x+sw/2,H/2+5,s.c,10);
if(i>0){const px=gap+(i-1)*(sw+gap)+sw;arr(px+3,H/2,x-3,H/2,'#555')}
// Stage-specific annotations
const labels=['ViT+TF','ANN K=100','Cross K=20','级联过滤','质量评分','投放决策'];
txt(labels[i],x+sw/2,H/2+30,'#666',8);ctx.globalAlpha=1});
// Metrics below
if(p>0.8){const metrics=['延迟:15ms','召回:92%','NDCG:0.85','拦截:3%','通过:95%','CTR:12%'];
stages.forEach((s,i)=>{const x=gap+i*(sw+gap);txt(metrics[i],x+sw/2,H/2+50,s.c,8)})}}}
];

function renderCode(){const p=document.getElementById('codePanel');p.innerHTML='';steps[currentStep].code.forEach(l=>{const d=document.createElement('div');d.className='code-line'+(l.hl?' highlight':'');d.textContent=l.text;p.appendChild(d)})}
function animate(){animProgress+=.015;if(animProgress>1)animProgress=1;steps[currentStep].render(animProgress);if(animProgress<1)animId=requestAnimationFrame(animate)}
function goToStep(s){currentStep=Math.max(0,Math.min(steps.length-1,s));animProgress=0;if(animId)cancelAnimationFrame(animId);animate();updateUI()}
function nextStep(){if(currentStep<steps.length-1)goToStep(currentStep+1)}function prevStep(){if(currentStep>0)goToStep(currentStep-1)}
function replay(){animProgress=0;if(animId)cancelAnimationFrame(animId);animate()}
function updateUI(){document.getElementById('infoTitle').textContent=steps[currentStep].title;document.getElementById('infoText').textContent=steps[currentStep].info;document.getElementById('stepCounter').textContent=`Step ${currentStep+1}/${steps.length}`;document.getElementById('prevBtn').disabled=currentStep===0;document.getElementById('nextBtn').disabled=currentStep===steps.length-1;document.querySelectorAll('.dot').forEach((d,i)=>{d.className='dot'+(i===currentStep?' active':(i<currentStep?' done':''))});renderCode()}
function init(){const d=document.getElementById('dots');steps.forEach((_,i)=>{const dot=document.createElement('div');dot.className='dot'+(i===0?' active':'');dot.onclick=()=>goToStep(i);d.appendChild(dot)});updateUI();animate()}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nextStep();if(e.key==='ArrowLeft')prevStep()});init();
</script></body></html>
