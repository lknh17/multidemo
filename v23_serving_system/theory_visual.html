<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>V23 - 在线推理服务：原理可视化</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0e1a;color:#e0e0e0;font-family:-apple-system,sans-serif;overflow-x:hidden}.header{height:64px;background:linear-gradient(135deg,#1a1e2e,#2a2e3e);display:flex;align-items:center;padding:0 24px;border-bottom:1px solid #333}.badge{background:linear-gradient(135deg,#607d8b,#90a4ae);padding:4px 12px;border-radius:12px;font-size:13px;font-weight:700;margin-right:12px}.title{font-size:18px;font-weight:600;flex:1}.page-type{font-size:13px;color:#aaa;background:#1a1e2e;padding:4px 12px;border-radius:8px}.dots{display:flex;gap:6px;margin-left:16px}.dot{width:10px;height:10px;border-radius:50%;background:#333;cursor:pointer;transition:all .3s}.dot.active{background:#607d8b;box-shadow:0 0 8px #607d8b}.dot.done{background:#90a4ae}.main{display:flex;height:calc(100vh - 136px)}.canvas-area{flex:6;background:#0d1117;display:flex;align-items:center;justify-content:center}canvas{border-radius:8px}.info-panel{flex:4;padding:24px;overflow-y:auto;background:#111827;border-left:1px solid #222}.step-title{font-size:20px;font-weight:700;margin-bottom:12px;background:linear-gradient(90deg,#607d8b,#90a4ae);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.step-desc{font-size:15px;line-height:1.8;color:#ccc}.formula{background:#1a1e2e;border:1px solid #333;border-radius:8px;padding:12px;font-family:monospace;font-size:14px;color:#7dd3fc;margin:12px 0;white-space:pre-wrap}.controls{height:72px;background:#111827;display:flex;align-items:center;justify-content:center;gap:16px;border-top:1px solid #222}.btn{padding:10px 24px;border:1px solid #555;border-radius:8px;background:transparent;color:#e0e0e0;cursor:pointer;font-size:14px;transition:all .2s}.btn:hover{border-color:#607d8b;box-shadow:0 0 12px rgba(96,125,139,.3)}.btn:disabled{opacity:.3}.step-counter{font-size:16px;font-weight:600;min-width:100px;text-align:center}.hl{color:#607d8b}.hl2{color:#90a4ae}.hl3{color:#00e5ff}</style></head>
<body>
<div class="header"><span class="badge">V23</span><span class="title">在线推理服务系统</span><span class="page-type">原理可视化</span><div class="dots" id="dots"></div></div>
<div class="main"><div class="canvas-area"><canvas id="canvas"></canvas></div><div class="info-panel"><div class="step-title" id="stepTitle"></div><div class="step-desc" id="stepDesc"></div></div></div>
<div class="controls"><button class="btn" id="prevBtn" onclick="prevStep()">◀ 上一步</button><div class="step-counter" id="stepCounter"></div><button class="btn" id="nextBtn" onclick="nextStep()">下一步 ▶</button><button class="btn" onclick="replay()">↻ 重播</button></div>
<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');let W,H,currentStep=0,animProgress=0,animId=null;
function resize(){const a=document.querySelector('.canvas-area');W=canvas.width=a.clientWidth-40;H=canvas.height=a.clientHeight-40}window.addEventListener('resize',resize);resize();
function RR(x,y,w,h,r,f,s){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();if(f){ctx.fillStyle=f;ctx.fill()}if(s){ctx.strokeStyle=s;ctx.stroke()}}
function arr(x1,y1,x2,y2,c='#555'){const a=Math.atan2(y2-y1,x2-x1),l=7;ctx.strokeStyle=c;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-l*Math.cos(a-.3),y2-l*Math.sin(a-.3));ctx.lineTo(x2-l*Math.cos(a+.3),y2-l*Math.sin(a+.3));ctx.fill()}
function txt(t,x,y,c='#aaa',s=12){ctx.fillStyle=c;ctx.font=s+'px sans-serif';ctx.textAlign='center';ctx.fillText(t,x,y)}

const steps=[
{title:"Little's Law 与排队论",desc:`<p><span class="hl">Little's Law</span>：系统中平均请求数 = 到达速率 × 平均延迟。</p><div class="formula">L = λ × W
L = 系统中平均请求数
λ = QPS (请求到达速率)
W = 平均响应延迟

稳定条件: ρ = λ/(c·μ) < 1
c = worker 数, μ = 单 worker 服务速率</div>`,render(p){ctx.clearRect(0,0,W,H);const cx=W/2,cy=H/2-20;
RR(cx-120,cy-60,240,120,8,'#1a1e2e','#607d8b');txt('Serving System',cx,cy-45,'#607d8b',14);
const n=Math.floor(p*8);for(let i=0;i<n;i++){const x=cx-90+i*25,y=cy-10;ctx.fillStyle='#90a4ae';ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fill();txt('r',x,y+4,'#fff',9)}
txt(`L = ${n} 个请求在系统中`,cx,cy+25,'#90a4ae',12);
if(p>.3){const qps=Math.floor(p*100);txt(`λ = ${qps} QPS →`,cx-200,cy,'#00e5ff',12);arr(cx-160,cy,cx-125,cy,'#00e5ff')}
if(p>.6){txt(`→ 完成`,cx+160,cy,'#4caf50',12);arr(cx+125,cy,cx+155,cy,'#4caf50');txt(`W = ${(50*p).toFixed(0)} ms`,cx,cy+50,'#f7c948',13)}}},

{title:"动态批处理 (Dynamic Batching)",desc:`<p><span class="hl">动态批处理</span>通过凑批提升 GPU 利用率。</p><div class="formula">T(B) ≈ T₀ + α·B  (推理延迟)
Throughput = B / T(B) = B / (T₀ + αB)

触发条件(二选一)：
1. 队列达到 max_batch_size
2. 最早请求等待超过 max_wait_ms

Total Latency = τ_wait + T(B) + T_post</div>`,render(p){ctx.clearRect(0,0,W,H);const cx=W/2,cy=H/2-30;
txt('请求队列',80,30,'#aaa',13);
const nr=Math.min(8,Math.floor(p*12));for(let i=0;i<nr;i++){const y=50+i*22;RR(30,y,100,18,3,'#607d8b33','#607d8b');txt(`req_${i}`,80,y+13,'#90a4ae',10)}
if(p>.4){arr(140,cy,200,cy,'#607d8b');RR(210,cy-40,120,80,6,'#1a1e2e','#00e5ff');txt('GPU',270,cy-25,'#00e5ff',11);txt(`Batch=${Math.min(nr,8)}`,270,cy+5,'#fff',11);txt(`T=${(5+nr*1.2).toFixed(0)}ms`,270,cy+25,'#f7c948',10)}
if(p>.7){arr(340,cy,390,cy,'#4caf50');txt('Results',430,cy+4,'#4caf50',12)}
if(p>.5){const bx=cx+80,by=H-80;txt('Throughput vs Batch Size',bx,by-60,'#aaa',11);for(let b=1;b<=8;b++){const tp=b/(5+b*1.2)*1000;const h=tp/800*50*Math.min(1,(p-.5)*4);ctx.fillStyle='#607d8b';ctx.fillRect(bx-80+b*20,by-h,14,h);txt(b+'',bx-73+b*20,by+12,'#aaa',9)}}}},

{title:"ONNX 图优化与算子融合",desc:`<p><span class="hl">ONNX 优化</span>通过算子融合、常量折叠减少内存 IO 和 kernel 调度开销。</p><div class="formula">算子融合:
MatMul → Add → ReLU  ⟹  FusedMatMulBiasReLU

常量折叠:
y = x·(W₁·W₂) + b  ⟹  y = x·W_merged + b

TensorRT 内核融合:
Conv → BN → ReLU  ⟹  CBR_Fused
Speedup: 1.2x ~ 3x (依赖模型结构)</div>`,render(p){ctx.clearRect(0,0,W,H);const cx=W/2,cy=H/2-20;
// 未融合
txt('优化前',120,20,'#aaa',13);const ops=['MatMul','Add','ReLU','Softmax'];
ops.forEach((o,i)=>{const y=40+i*40;const alpha=Math.min(1,p*3-i*.3);if(alpha<=0)return;ctx.globalAlpha=alpha;RR(50,y,140,28,4,'#1a1e2e','#607d8b');txt(o,120,y+18,'#607d8b',11);if(i>0)arr(120,y-12+40,120,y,'#555');ctx.globalAlpha=1});
// 融合后
if(p>.5){txt('优化后',cx+100,20,'#00e5ff',13);
const fused=[{n:'FusedMatMulBiasReLU',c:'#00e5ff'},{n:'Softmax',c:'#90a4ae'}];
fused.forEach((f,i)=>{const y=60+i*50;const alpha=Math.min(1,(p-.5)*3-i*.3);if(alpha<=0)return;ctx.globalAlpha=alpha;RR(cx+30,y,150,32,4,'#1a1e2e',f.c);txt(f.n,cx+105,y+21,f.c,11);if(i>0)arr(cx+105,y-18+50,cx+105,y,'#555');ctx.globalAlpha=1});
arr(200,100,cx+25,80,'#f7c948');txt('融合',cx-20,75,'#f7c948',10)}
if(p>.8){txt(`Speedup ≈ ${(1+p).toFixed(1)}x`,cx+105,180,'#f7c948',13)}}},

{title:"ANN 近似最近邻搜索 (IVF)",desc:`<p><span class="hl">IVF 索引</span>通过聚类实现 sub-linear 搜索。</p><div class="formula">暴力搜索: O(n·d)
IVF 搜索:  O(nprobe · n/nlist · d)

步骤:
1. 离线: K-Means 聚类 → nlist 个中心
2. 在线: 查询 → 找最近 nprobe 个簇 → 簇内暴力
3. 召回率 ∝ nprobe/nlist

HNSW: O(d·log n) — 图搜索更快但内存更大</div>`,render(p){ctx.clearRect(0,0,W,H);const cx=W/2,cy=H/2;
// 聚类中心
const clusters=[[cx-120,cy-60,'#607d8b'],[cx+80,cy-80,'#90a4ae'],[cx-80,cy+60,'#00e5ff'],[cx+100,cy+40,'#f7c948']];
clusters.forEach(([x,y,c],i)=>{const alpha=Math.min(1,p*3-i*.3);if(alpha<=0)return;ctx.globalAlpha=alpha;
// 簇内点
for(let j=0;j<8;j++){const px=x+(Math.sin(j*1.1+i)*30),py=y+(Math.cos(j*1.3+i)*25);ctx.fillStyle=c+'88';ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fill()}
// 聚类中心
ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fill();txt(`C${i}`,x,y-12,c,10);ctx.globalAlpha=1});
// 查询点
if(p>.4){const qx=cx-20,qy=cy+10;ctx.fillStyle='#ff4444';ctx.beginPath();ctx.arc(qx,qy,6,0,Math.PI*2);ctx.fill();txt('Query',qx,qy-12,'#ff4444',11);
if(p>.6){ctx.setLineDash([3,3]);ctx.strokeStyle='#ff444488';ctx.beginPath();ctx.moveTo(qx,qy);ctx.lineTo(clusters[2][0],clusters[2][1]);ctx.stroke();ctx.moveTo(qx,qy);ctx.lineTo(clusters[0][0],clusters[0][1]);ctx.stroke();ctx.setLineDash([]);txt('nprobe=2',cx,cy+100,'#ff4444',11)}}}},

{title:"缓存命中率与 Zipf 分布",desc:`<p><span class="hl">LRU 缓存</span>在 Zipf 分布下效果显著——少量热门 key 贡献大部分请求。</p><div class="formula">Zipf 分布: P(rank=i) ∝ 1/i^α

Hit Rate ≈ Σ(i=1..C) i^{-α} / Σ(i=1..N) i^{-α}

α=0.5: 均匀分布 → 命中率低
α=1.2: 集中分布 → 命中率高
α=2.0: 极度集中 → 命中率极高

TTL 过期: P(valid) = e^{-t/TTL}</div>`,render(p){ctx.clearRect(0,0,W,H);const cx=W/2,cy=H/2;
// Zipf 分布柱状图
txt('请求频率分布 (Zipf)',cx,25,'#aaa',13);
const alphas=[0.5,1.2,2.0];const colors=['#607d8b','#00e5ff','#f7c948'];
alphas.forEach((a,ai)=>{const alpha=Math.min(1,p*3-ai*.5);if(alpha<=0)return;ctx.globalAlpha=alpha;
const baseX=50+ai*(W/3-10);txt(`α=${a}`,baseX+60,45,colors[ai],11);
let total=0;for(let i=1;i<=20;i++)total+=1/Math.pow(i,a);
for(let i=0;i<15;i++){const freq=1/Math.pow(i+1,a)/total;const h=freq*200;ctx.fillStyle=colors[ai];ctx.fillRect(baseX+i*8,150-h,6,h)}
ctx.globalAlpha=1});
// 命中率
if(p>.6){txt('Cache Hit Rate',cx,180,'#aaa',12);const hrs=[0.45,0.78,0.95];
alphas.forEach((a,i)=>{const bw=80,bh=hrs[i]*60*(p-.6)*2.5;const x=cx-120+i*100;
RR(x,230-bh,bw,bh,3,colors[i]+'66',colors[i]);txt(`${(hrs[i]*100).toFixed(0)}%`,x+40,225-bh,colors[i],11);txt(`α=${a}`,x+40,245,'#aaa',10)})}}},

{title:"负载均衡策略对比",desc:`<p>三种经典<span class="hl">负载均衡</span>策略的分配特性。</p><div class="formula">Round-Robin: node = req_id mod N
  → 均匀但不考虑节点状态

Least-Connection: node* = argmin(active_i)
  → 适应节点处理速度差异

Consistent Hash: hash(key) → 哈希环
  → 节点变动只影响邻近区间
  → 迁移代价 O(K/N)</div>`,render(p){ctx.clearRect(0,0,W,H);const cx=W/2,cy=H/2-20;
// 4 个节点
const nodes=[[cx-120,cy-80],[cx+120,cy-80],[cx-120,cy+60],[cx+120,cy+60]];
nodes.forEach(([x,y],i)=>{RR(x-30,y-15,60,30,4,'#1a1e2e','#607d8b');txt(`Node${i}`,x,y+5,'#607d8b',11)});
// Round-robin 请求分配
if(p>.2){const nr=Math.min(8,Math.floor(p*10));for(let r=0;r<nr;r++){const ni=r%4;const[nx,ny]=nodes[ni];const rx=cx,ry=cy-140;const t=Math.min(1,(p-.2)*3-r*.15);if(t<=0)continue;const px=rx+(nx-rx)*t,py=ry+(ny-ry)*t;ctx.fillStyle='#90a4ae';ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fill()}}
// 标签
txt('Round-Robin 均匀分配',cx,H-60,'#90a4ae',12);
if(p>.7){ctx.strokeStyle='#f7c948';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.beginPath();ctx.arc(cx,cy,100,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);txt('Consistent Hash Ring',cx,cy+120,'#f7c948',11)}}}
];

function animate(){animProgress+=.015;if(animProgress>1)animProgress=1;steps[currentStep].render(animProgress);if(animProgress<1)animId=requestAnimationFrame(animate)}
function goToStep(s){currentStep=Math.max(0,Math.min(steps.length-1,s));animProgress=0;if(animId)cancelAnimationFrame(animId);animate();updateUI()}
function nextStep(){if(currentStep<steps.length-1)goToStep(currentStep+1)}
function prevStep(){if(currentStep>0)goToStep(currentStep-1)}
function replay(){animProgress=0;if(animId)cancelAnimationFrame(animId);animate()}
function updateUI(){document.getElementById('stepTitle').innerHTML=steps[currentStep].title;document.getElementById('stepDesc').innerHTML=steps[currentStep].desc;document.getElementById('stepCounter').textContent=`Step ${currentStep+1}/${steps.length}`;document.getElementById('prevBtn').disabled=currentStep===0;document.getElementById('nextBtn').disabled=currentStep===steps.length-1;document.querySelectorAll('.dot').forEach((d,i)=>{d.className='dot'+(i===currentStep?' active':(i<currentStep?' done':''))})}
function init(){const d=document.getElementById('dots');steps.forEach((_,i)=>{const dot=document.createElement('div');dot.className='dot'+(i===0?' active':'');dot.onclick=()=>goToStep(i);d.appendChild(dot)});updateUI();animate()}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nextStep();if(e.key==='ArrowLeft')prevStep()});init();
</script></body></html>
