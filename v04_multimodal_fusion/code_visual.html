<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>v04 CLIP - 代码可视化</title>
<style>
:root{--primary:#6C5CE7;--accent:#00B894;--blue:#0984E3;--bg-dark:#0A0E17;--bg-card:#111827;--bg-panel:#1A1F2E;--text-main:#E2E8F0;--text-sub:#94A3B8;--text-dim:#64748B;--warn:#F59E0B;--danger:#EF4444;--success:#10B981}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg-dark);color:var(--text-main);min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{height:64px;background:linear-gradient(135deg,rgba(108,92,231,.15),rgba(0,184,148,.1));border-bottom:1px solid rgba(108,92,231,.3);display:flex;align-items:center;padding:0 24px;flex-shrink:0;backdrop-filter:blur(10px)}
.badge{background:linear-gradient(135deg,var(--primary),var(--blue));padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;margin-right:12px}.header h1{font-size:20px;font-weight:700}.header .tag{margin-left:16px;font-size:13px;color:var(--accent);border:1px solid rgba(0,184,148,.4);padding:2px 10px;border-radius:12px}
.dots{margin-left:auto;display:flex;gap:8px}.dots span{width:10px;height:10px;border-radius:50%;background:var(--text-dim);transition:all .3s;cursor:pointer}.dots span.active{background:var(--accent);box-shadow:0 0 8px var(--accent);transform:scale(1.3)}
.main{flex:1;display:flex;overflow:hidden}.canvas-area{flex:3;position:relative;background:radial-gradient(ellipse at center,rgba(108,92,231,.05),transparent 70%)}.canvas-area canvas{width:100%;height:100%}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.info-panel{flex:2;background:var(--bg-card);border-left:1px solid rgba(255,255,255,.06);padding:28px;overflow-y:auto;display:flex;flex-direction:column}
.step-title{font-size:22px;font-weight:700;margin-bottom:12px;background:linear-gradient(90deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.step-desc{font-size:15px;line-height:1.9;color:var(--text-sub)}.step-desc strong{color:var(--accent)}
.formula-box{background:var(--bg-panel);border:1px solid rgba(108,92,231,.3);border-radius:12px;padding:16px 20px;margin:16px 0;font-family:'Courier New',monospace;font-size:13px;color:var(--warn);text-align:left;line-height:1.8;white-space:pre-wrap}
.controls{height:72px;background:var(--bg-card);border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;gap:20px;flex-shrink:0}
.btn{padding:10px 28px;border-radius:12px;border:1px solid rgba(108,92,231,.5);background:rgba(108,92,231,.1);color:var(--text-main);font-size:15px;font-weight:600;cursor:pointer;transition:all .3s}.btn:hover{background:rgba(108,92,231,.3);transform:scale(1.05)}.btn:active{transform:scale(.97)}
.btn.accent{border-color:rgba(0,184,148,.5);background:rgba(0,184,148,.1)}.btn.accent:hover{background:rgba(0,184,148,.3)}
.step-counter{font-size:16px;font-weight:700;color:var(--text-sub);min-width:100px;text-align:center}
</style>
</head>
<body>
<div class="header"><span class="badge">v04</span><h1>Multimodal Fusion (CLIP)</h1><span class="tag">代码可视化</span><div class="dots" id="dots"></div></div>
<div class="main"><div class="canvas-area"><div class="grid-bg"></div><canvas id="canvas"></canvas></div>
<div class="info-panel"><div class="step-title" id="stepTitle"></div><div class="step-desc" id="stepDesc"></div><div class="formula-box" id="formulaBox" style="display:none"></div></div></div>
<div class="controls"><button class="btn" onclick="prevStep()">← 上一步</button><div class="step-counter" id="counter"></div><button class="btn accent" onclick="nextStep()">下一步 →</button><button class="btn" onclick="replay()" style="margin-left:20px">↻ 重播</button></div>
<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');let W,H,currentStep=0,animProgress=0,animId=null;
const steps=[
{title:'ImageEncoder + TextEncoder 双塔',
desc:'<strong>ImageEncoder</strong>（简化 ViT）：<br>patch_embed → cls_token + pos_embed → TransformerEncoder → [CLS] → LayerNorm → proj<br><br><strong>TextEncoder</strong>（Transformer Encoder）：<br>tok_embed + pos_embed → TransformerEncoder → MeanPooling → LayerNorm → proj<br><br>两个编码器都有独立的 <strong>proj</strong> 层（Linear(d_model, embed_dim, bias=False)），将各自的输出投影到共享空间。',
formula:'class ImageEncoder:\n  patch_embed → cls + pos → Encoder\n  → Norm(x[:,0]) → proj  # [B,embed_dim]\n\nclass TextEncoder:\n  tok_embed + pos → Encoder\n  → Norm(x.mean(1)) → proj  # [B,embed_dim]'},
{title:'MiniCLIP.forward：编码→投影→归一化',
desc:'MiniCLIP 的 forward 非常简洁：<br><br>① 图像编码: img_emb = <strong>image_encoder(images)</strong><br>② 文本编码: txt_emb = <strong>text_encoder(input_ids)</strong><br>③ L2 归一化: <strong>F.normalize(emb, dim=-1)</strong><br>④ 返回 (img_emb, txt_emb, logit_scale.exp())<br><br>logit_scale 是<strong>可学习参数</strong>，初始化为 log(1/0.07)，通过 exp() 转换为正值温度系数。',
formula:'def forward(self, images, input_ids):\n  img_emb = self.image_encoder(images)\n  txt_emb = self.text_encoder(input_ids)\n  img_emb = F.normalize(img_emb, dim=-1)\n  txt_emb = F.normalize(txt_emb, dim=-1)\n  return img_emb, txt_emb, self.logit_scale.exp()'},
{title:'InfoNCELoss：对称交叉熵',
desc:'InfoNCE 的核心是对 N×N 相似度矩阵做<strong>对称 CrossEntropy</strong>：<br><br>① 计算相似度: logits = τ × img_emb @ txt_emb.T<br>② 构造标签: labels = [0,1,2,...,N-1]（对角线）<br>③ Image→Text: CrossEntropy(logits, labels)<br>④ Text→Image: CrossEntropy(logits.T, labels)<br>⑤ 最终 Loss = (i2t + t2i) / 2<br><br>@操作是矩阵乘法，.t()是转置。labels用arange自动生成。',
formula:'class InfoNCELoss:\n  def forward(self, img_emb, txt_emb, scale):\n    logits = scale * img_emb @ txt_emb.t()\n    N = logits.size(0)\n    labels = torch.arange(N, device=logits.device)\n    loss_i2t = F.cross_entropy(logits, labels)\n    loss_t2i = F.cross_entropy(logits.t(), labels)\n    return (loss_i2t + loss_t2i) / 2'},
{title:'CrossAttentionFusion 数据流',
desc:'CrossAttentionFusion 模块让两个模态深度交互：<br><br>① <strong>norm1(query_features)</strong>: 对 Query 模态归一化<br>② <strong>norm1(context_features)</strong>: 对 Context 模态归一化<br>③ <strong>cross_attn(Q=h, K=c, V=c)</strong>: Q 来自 query，K/V 来自 context<br>④ <strong>残差连接</strong>: query + attn_output<br>⑤ <strong>FFN + 残差</strong>: query + FFN(norm2(query))<br><br>注意：只更新 query_features，context_features 不变。',
formula:'def forward(self, query_features, context_features):\n  h = self.norm1(query_features)   # Q模态\n  c = self.norm1(context_features)  # KV模态\n  attn_out, _ = self.cross_attn(h, c, c)\n  query_features = query_features + attn_out\n  query_features = query_features + \\\n    self.ffn(self.norm2(query_features))\n  return query_features'},
{title:'Recall@K 检索评估',
desc:'对比学习模型的检索性能评估：<br><br><strong>Recall@K</strong>：在 top-K 检索结果中，正确匹配出现的比例。<br><br>评估流程：<br>① 计算所有图文对的相似度矩阵<br>② 对每个 query，按相似度排序<br>③ 检查正确 match 是否在前 K 个结果中<br>④ 统计命中率<br><br>常用指标：R@1, R@5, R@10<br>• R@1 是最严格的（必须排第一）<br>• R@10 容忍度更高',
formula:'# Image-to-Text Recall@K\nsim = img_embs @ txt_embs.T  # [N,N]\nfor i in range(N):\n  ranked = sim[i].argsort(descending=True)\n  if i in ranked[:K]:  # 正确文本在 top-K?\n    hits += 1\nrecall_at_k = hits / N'}
];
function resize(){const r=window.devicePixelRatio||1,rect=canvas.parentElement.getBoundingClientRect();canvas.width=rect.width*r;canvas.height=rect.height*r;W=rect.width;H=rect.height;ctx.setTransform(r,0,0,r,0,0)}
window.addEventListener('resize',resize);
function ease(t){return t<.5?2*t*t:(4-2*t)*t-1}
function rrect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
function hsl(h,s,l){return`hsl(${h},${s}%,${l}%)`}

function renderStep0(p){
  const cx=W/2,topY=10,bw=150,bh=26,gap=7;
  // Image Encoder flow - left
  const lx=cx/2;
  const imgFlow=[{l:'Conv2d patch_embed',c:'#6C5CE7',t:0},{l:'+ cls_token',c:'#00B894',t:.08},{l:'+ pos_embed',c:'#F59E0B',t:.14},{l:'TransformerEncoder',c:'#0984E3',t:.22},{l:'Norm(x[:,0])',c:'#94A3B8',t:.30},{l:'proj → [B,embed_dim]',c:'#EF4444',t:.38}];
  let y=topY+20;
  const p1=ease(Math.min(1,p/.15));ctx.globalAlpha=p1;
  ctx.font='bold 14px PingFang SC';ctx.textAlign='center';ctx.fillStyle='#6C5CE7';ctx.fillText('ImageEncoder',lx,topY+10);ctx.globalAlpha=1;
  for(const f of imgFlow){
    const sp=ease(Math.max(0,Math.min(1,(p-f.t)/.12)));ctx.globalAlpha=sp;
    ctx.fillStyle=f.c+'1A';ctx.strokeStyle=f.c+'88';ctx.lineWidth=1;
    rrect(lx-bw/2,y,bw,bh,6);ctx.fill();ctx.stroke();
    ctx.fillStyle=f.c;ctx.font='11px Courier New';ctx.fillText(f.l,lx,y+17);ctx.globalAlpha=1;y+=bh+gap;
  }
  // Text Encoder flow - right
  const rx=cx+cx/2;y=topY+20;
  const txtFlow=[{l:'tok_embed(input_ids)',c:'#0984E3',t:.15},{l:'+ pos_embed[:,:L]',c:'#F59E0B',t:.22},{l:'TransformerEncoder',c:'#0984E3',t:.30},{l:'Norm(x.mean(dim=1))',c:'#94A3B8',t:.38},{l:'proj → [B,embed_dim]',c:'#EF4444',t:.46}];
  const p2=ease(Math.max(0,Math.min(1,(p-.1)/.15)));ctx.globalAlpha=p2;
  ctx.font='bold 14px PingFang SC';ctx.fillStyle='#0984E3';ctx.fillText('TextEncoder',rx,topY+10);ctx.globalAlpha=1;
  for(const f of txtFlow){
    const sp=ease(Math.max(0,Math.min(1,(p-f.t)/.12)));ctx.globalAlpha=sp;
    ctx.fillStyle=f.c+'1A';ctx.strokeStyle=f.c+'88';ctx.lineWidth=1;
    rrect(rx-bw/2,y,bw,bh,6);ctx.fill();ctx.stroke();
    ctx.fillStyle=f.c;ctx.font='11px Courier New';ctx.fillText(f.l,rx,y+17);ctx.globalAlpha=1;y+=bh+gap;
  }
  // Shared space indicator
  if(p>.55){
    const sp=ease((p-.55)/.2);ctx.globalAlpha=sp;
    ctx.strokeStyle='#F59E0B';ctx.lineWidth=2;ctx.setLineDash([5,5]);
    rrect(cx-160,y+5,320,30,10);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#F59E0B';ctx.font='bold 12px PingFang SC';
    ctx.fillText('共享 embed_dim 空间',cx,y+25);ctx.globalAlpha=1;
  }
}

function renderStep1(p){
  const cx=W/2,topY=10,bw=210,bh=30,gap=8;
  const flow=[
    {l:'img_emb = image_encoder(images)',c:'#6C5CE7',t:0},
    {l:'txt_emb = text_encoder(input_ids)',c:'#0984E3',t:.12},
    {l:'img_emb = F.normalize(img_emb)',c:'#00B894',t:.28},
    {l:'txt_emb = F.normalize(txt_emb)',c:'#00B894',t:.40},
    {l:'scale = logit_scale.exp()',c:'#F59E0B',t:.55},
    {l:'return img_emb, txt_emb, scale',c:'#EF4444',t:.70},
  ];
  let y=topY;
  for(const f of flow){
    const sp=ease(Math.max(0,Math.min(1,(p-f.t)/.15)));ctx.globalAlpha=sp;
    ctx.fillStyle=f.c+'15';ctx.strokeStyle=f.c+'88';ctx.lineWidth=1.5;
    rrect(cx-bw/2,y,bw,bh,8);ctx.fill();ctx.stroke();
    ctx.fillStyle=f.c;ctx.font='12px Courier New';ctx.textAlign='center';ctx.fillText(f.l,cx,y+20);
    if(y>topY&&sp>.5){ctx.strokeStyle=f.c+'33';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cx,y);ctx.lineTo(cx,y-gap);ctx.stroke()}
    ctx.globalAlpha=1;y+=bh+gap;
  }
  // logit_scale note
  if(p>.85){
    const np=ease((p-.85)/.15);ctx.globalAlpha=np;
    ctx.font='12px PingFang SC';ctx.fillStyle='#F59E0B';ctx.textAlign='center';
    ctx.fillText('logit_scale = nn.Parameter(log(1/0.07)) ≈ 2.66',cx,y+10);
    ctx.fillText('exp(2.66) ≈ 14.3  — 可学习的温度系数',cx,y+28);ctx.globalAlpha=1;
  }
}

function renderStep2(p){
  const cx=W/2,topY=10,n=4;
  const sz=Math.min(48,(Math.min(W,H)-80)/n);
  const sx=cx-n*sz/2,sy=topY+35;
  // Title
  ctx.font='bold 14px PingFang SC';ctx.textAlign='center';
  ctx.fillStyle=`rgba(148,163,184,${ease(Math.min(1,p/.15))})`;
  ctx.fillText('InfoNCELoss: 相似度矩阵 → 对称 CrossEntropy',cx,topY+5);
  // Step 1: compute similarity
  const p1=ease(Math.max(0,Math.min(1,(p-.1)/.25)));
  ctx.globalAlpha=p1;
  ctx.font='12px PingFang SC';ctx.fillStyle='#F59E0B';
  ctx.fillText('logits = τ × img_emb @ txt_emb.T',cx,sy-8);
  // Matrix
  const scores=[[.92,.12,.08,.05],[.10,.88,.06,.11],[.07,.09,.91,.08],[.06,.11,.07,.89]];
  for(let i=0;i<n;i++)for(let j=0;j<n;j++){
    const delay=.15+(i*n+j)*.02;const cp=ease(Math.max(0,Math.min(1,(p-delay)/.2)));
    const v=scores[i][j]*cp;const x=sx+j*sz,y2=sy+i*sz;
    const isDiag=i===j;
    ctx.fillStyle=isDiag?`rgba(0,184,148,${.1+v*.5})`:`rgba(100,116,139,${.05+v*.2})`;
    ctx.fillRect(x+1,y2+1,sz-2,sz-2);
    if(isDiag&&cp>.5){ctx.strokeStyle='#00B894';ctx.lineWidth=2;ctx.strokeRect(x,y2,sz,sz)}
    ctx.fillStyle=`rgba(255,255,255,${.3+v*.7})`;ctx.font='bold 10px Courier New';ctx.textAlign='center';
    ctx.fillText(scores[i][j].toFixed(2),x+sz/2,y2+sz/2+3);
  }
  ctx.globalAlpha=1;
  // Labels
  if(p>.5){
    const lp=ease((p-.5)/.15);ctx.globalAlpha=lp;
    ctx.font='11px PingFang SC';ctx.fillStyle='#00B894';
    ctx.fillText('labels = [0,1,2,3]',cx,sy+n*sz+15);
    ctx.fillText('对角线 = 正确匹配',cx,sy+n*sz+32);ctx.globalAlpha=1;
  }
  // Symmetric loss arrows
  if(p>.65){
    const sp=ease((p-.65)/.2);ctx.globalAlpha=sp;
    ctx.font='12px PingFang SC';
    ctx.fillStyle='#6C5CE7';ctx.fillText('行: img→txt CE',sx-30,sy+n*sz/2);
    ctx.fillStyle='#0984E3';ctx.fillText('列: txt→img CE',cx,sy-25);
    // Arrows
    ctx.strokeStyle='#6C5CE7';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(sx-5,sy+10);ctx.lineTo(sx-5,sy+n*sz-10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx-8,sy+n*sz-15);ctx.lineTo(sx-5,sy+n*sz-8);ctx.lineTo(sx-2,sy+n*sz-15);ctx.stroke();
    ctx.strokeStyle='#0984E3';
    ctx.beginPath();ctx.moveTo(sx+10,sy-5);ctx.lineTo(sx+n*sz-10,sy-5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx+n*sz-15,sy-8);ctx.lineTo(sx+n*sz-8,sy-5);ctx.lineTo(sx+n*sz-15,sy-2);ctx.stroke();
    ctx.globalAlpha=1;
  }
}

function renderStep3(p){
  const cx=W/2,topY=10,bw=200,bh=28,gap=8;
  const flow=[
    {l:'h = norm1(query_features)',c:'#F59E0B',t:0,note:'Query 归一化'},
    {l:'c = norm1(context_features)',c:'#F59E0B',t:.10,note:'Context 归一化'},
    {l:'cross_attn(Q=h, K=c, V=c)',c:'#6C5CE7',t:.22,note:'跨模态注意力'},
    {l:'query = query + attn_out',c:'#EF4444',t:.38,note:'残差连接'},
    {l:'norm2(query)',c:'#F59E0B',t:.50,note:''},
    {l:'FFN (4×d → GELU → d)',c:'#0984E3',t:.60,note:'前馈网络'},
    {l:'query = query + ffn_out',c:'#EF4444',t:.72,note:'残差连接'},
    {l:'return query_features',c:'#00B894',t:.84,note:'只更新 Q 模态'},
  ];
  let y=topY;
  for(const f of flow){
    const sp=ease(Math.max(0,Math.min(1,(p-f.t)/.12)));ctx.globalAlpha=sp;
    ctx.fillStyle=f.c+'15';ctx.strokeStyle=f.c+'88';ctx.lineWidth=1.5;
    rrect(cx-bw/2,y,bw,bh,8);ctx.fill();ctx.stroke();
    ctx.fillStyle=f.c;ctx.font='11px Courier New';ctx.textAlign='center';ctx.fillText(f.l,cx,y+18);
    if(f.note){ctx.font='10px PingFang SC';ctx.fillStyle=f.c+'AA';ctx.textAlign='left';ctx.fillText(f.note,cx+bw/2+8,y+18)}
    if(y>topY&&sp>.5){ctx.strokeStyle=f.c+'33';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cx,y);ctx.lineTo(cx,y-gap);ctx.stroke()}
    ctx.globalAlpha=1;y+=bh+gap;
  }
}

function renderStep4(p){
  const cx=W/2,topY=15;
  ctx.font='bold 14px PingFang SC';ctx.textAlign='center';
  ctx.fillStyle=`rgba(148,163,184,${ease(Math.min(1,p/.15))})`;
  ctx.fillText('Recall@K 检索评估',cx,topY);
  // Similarity matrix
  const n=5,sz=Math.min(35,(W-100)/n);
  const sx=cx-n*sz/2,sy=topY+30;
  const p1=ease(Math.max(0,Math.min(1,(p-.1)/.3)));
  const scores=[[.95,.15,.08,.12,.03],[.10,.90,.11,.05,.09],[.07,.08,.92,.10,.06],[.12,.06,.05,.88,.14],[.04,.11,.09,.13,.91]];
  ctx.globalAlpha=p1;
  for(let i=0;i<n;i++)for(let j=0;j<n;j++){
    const v=scores[i][j];
    ctx.fillStyle=i===j?`rgba(0,184,148,${.15+v*.4})`:`rgba(100,116,139,${.05+v*.15})`;
    ctx.fillRect(sx+j*sz+1,sy+i*sz+1,sz-2,sz-2);
    ctx.fillStyle=`rgba(255,255,255,${.4+v*.6})`;ctx.font='9px Courier New';
    ctx.fillText(v.toFixed(2),sx+j*sz+sz/2,sy+i*sz+sz/2+3);
  }
  ctx.globalAlpha=1;
  // Ranking demonstration
  if(p>.4){
    const rp=ease((p-.4)/.3);ctx.globalAlpha=rp;
    const rankY=sy+n*sz+20;
    ctx.font='13px PingFang SC';ctx.fillStyle='#F59E0B';
    ctx.fillText('Query: img_0 的检索结果排序',cx,rankY);
    // Show sorted results
    const results=[{l:'txt_0 ✓',s:.95,c:'#00B894'},{l:'txt_1',s:.15,c:'#94A3B8'},{l:'txt_3',s:.12,c:'#94A3B8'},{l:'txt_2',s:.08,c:'#94A3B8'},{l:'txt_4',s:.03,c:'#94A3B8'}];
    const barW=50;const bx=cx-results.length*barW/2;
    for(let i=0;i<results.length;i++){
      const r=results[i];const bh2=r.s*80;
      ctx.fillStyle=r.c+'44';
      ctx.fillRect(bx+i*barW+5,rankY+60-bh2,barW-10,bh2);
      ctx.strokeStyle=r.c;ctx.lineWidth=1;
      ctx.strokeRect(bx+i*barW+5,rankY+60-bh2,barW-10,bh2);
      ctx.fillStyle=r.c;ctx.font='10px PingFang SC';
      ctx.fillText(r.l,bx+i*barW+barW/2,rankY+75);
      ctx.font='9px Courier New';ctx.fillStyle='#E2E8F0';
      ctx.fillText(r.s.toFixed(2),bx+i*barW+barW/2,rankY+60-bh2-5);
    }
    ctx.globalAlpha=1;
  }
  // Recall@K results
  if(p>.75){
    const kp=ease((p-.75)/.25);ctx.globalAlpha=kp;
    const ky=sy+n*sz+105;
    ctx.font='12px PingFang SC';ctx.fillStyle='#00B894';
    ctx.fillText('R@1: 正确在第1位 → 命中!',cx,ky);
    ctx.fillText('R@5: 正确在前5位 → 命中!',cx,ky+20);
    ctx.fillStyle='#94A3B8';ctx.font='11px PingFang SC';
    ctx.fillText('Recall@K = 命中数 / 总查询数',cx,ky+45);
    ctx.globalAlpha=1;
  }
}

const renderers=[renderStep0,renderStep1,renderStep2,renderStep3,renderStep4];
function render(){ctx.clearRect(0,0,W,H);if(renderers[currentStep])renderers[currentStep](animProgress)}
function startAnim(){animProgress=0;const start=performance.now(),dur=2500;function tick(now){animProgress=Math.min(1,(now-start)/dur);render();if(animProgress<1)animId=requestAnimationFrame(tick)}if(animId)cancelAnimationFrame(animId);animId=requestAnimationFrame(tick)}
function updateUI(){const s=steps[currentStep];document.getElementById('stepTitle').textContent=s.title;document.getElementById('stepDesc').innerHTML=s.desc;const fb=document.getElementById('formulaBox');if(s.formula){fb.style.display='block';fb.textContent=s.formula}else fb.style.display='none';document.getElementById('counter').textContent=`Step ${currentStep+1}/${steps.length}`;const d=document.getElementById('dots');d.innerHTML='';for(let i=0;i<steps.length;i++){const s2=document.createElement('span');if(i===currentStep)s2.className='active';s2.onclick=(idx=>()=>{currentStep=idx;updateUI();startAnim()})(i);d.appendChild(s2)}}
function nextStep(){if(currentStep<steps.length-1){currentStep++;updateUI();startAnim()}}
function prevStep(){if(currentStep>0){currentStep--;updateUI();startAnim()}}
function replay(){startAnim()}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nextStep();else if(e.key==='ArrowLeft')prevStep()});
resize();updateUI();startAnim();
</script>
</body>
</html>
