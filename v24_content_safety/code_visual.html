<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>V24 - 内容安全：代码讲解</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0e1a;color:#e0e0e0;font-family:-apple-system,sans-serif}.header{height:64px;background:linear-gradient(135deg,#1a1e2e,#2a2e3e);display:flex;align-items:center;padding:0 24px;border-bottom:1px solid #333}.badge{background:linear-gradient(135deg,#f44336,#ef9a9a);padding:4px 12px;border-radius:12px;font-size:13px;font-weight:700;margin-right:12px}.title{font-size:18px;font-weight:600;flex:1}.page-type{font-size:13px;color:#aaa;background:#1a1e2e;padding:4px 12px;border-radius:8px}.dots{display:flex;gap:6px;margin-left:16px}.dot{width:10px;height:10px;border-radius:50%;background:#333;cursor:pointer;transition:all .3s}.dot.active{background:#f44336}.dot.done{background:#ef9a9a}.main{display:flex;height:calc(100vh - 136px)}.code-panel{flex:4;padding:16px;overflow-y:auto;background:#0d1117;font-family:monospace;font-size:13px;line-height:1.6}.code-line{padding:2px 8px;border-radius:3px;white-space:pre}.code-line.highlight{background:#f4433622;border-left:3px solid #f44336}.canvas-area{flex:6;position:relative;display:flex;align-items:center;justify-content:center;background:#111827}canvas{border-radius:8px}.info-box{position:absolute;bottom:16px;left:16px;right:16px;background:#1a1e2eee;border:1px solid #333;border-radius:8px;padding:12px}.info-title{font-size:14px;font-weight:700;color:#f44336;margin-bottom:4px}.info-text{font-size:13px;color:#ccc}.controls{height:72px;background:#111827;display:flex;align-items:center;justify-content:center;gap:16px;border-top:1px solid #222}.btn{padding:10px 24px;border:1px solid #555;border-radius:8px;background:transparent;color:#e0e0e0;cursor:pointer;font-size:14px;transition:all .2s}.btn:hover{border-color:#f44336}.btn:disabled{opacity:.3}.step-counter{font-size:16px;font-weight:600;min-width:100px;text-align:center}</style></head>
<body>
<div class="header"><span class="badge">V24</span><span class="title">内容安全与合规</span><span class="page-type">代码讲解</span><div class="dots" id="dots"></div></div>
<div class="main"><div class="code-panel" id="codePanel"></div><div class="canvas-area"><canvas id="canvas"></canvas><div class="info-box"><div class="info-title" id="infoTitle"></div><div class="info-text" id="infoText"></div></div></div></div>
<div class="controls"><button class="btn" id="prevBtn" onclick="prevStep()">◀ 上一步</button><div class="step-counter" id="stepCounter"></div><button class="btn" id="nextBtn" onclick="nextStep()">下一步 ▶</button><button class="btn" onclick="replay()">↻ 重播</button></div>
<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');let W,H,currentStep=0,animProgress=0,animId=null;
function resize(){const a=document.querySelector('.canvas-area');W=canvas.width=a.clientWidth-40;H=canvas.height=a.clientHeight-120}window.addEventListener('resize',resize);resize();
function RR(x,y,w,h,r,f,s){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();if(f){ctx.fillStyle=f;ctx.fill()}if(s){ctx.strokeStyle=s;ctx.stroke()}}
function txt(t,x,y,c='#aaa',s=12){ctx.fillStyle=c;ctx.font=s+'px sans-serif';ctx.textAlign='center';ctx.fillText(t,x,y)}
function arr(x1,y1,x2,y2,c='#555'){ctx.strokeStyle=c;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}

const steps=[
{title:"ContentClassifier.forward",info:"8 类独立 Sigmoid + 可调阈值 → 多标签安全预测",
code:[{text:'def forward(self, images):',hl:true},{text:'    features = self.backbone(images)',hl:false},{text:'    cls_feat = features[:, 0]  # CLS',hl:true},{text:'    ',hl:false},{text:'    logits = self.classifier(cls_feat)',hl:true},{text:'    probs = torch.sigmoid(logits)  # [B,8]',hl:true},{text:'    ',hl:false},{text:'    # 每类独立阈值判断',hl:false},{text:'    preds = (probs > self.thresholds)',hl:true},{text:'    return {logits, probs, preds}',hl:false}],
render(p){ctx.clearRect(0,0,W,H);const cx=W/2;
RR(20,15,120,25,4,'#1a1e2e','#4caf50');txt('Image [B,3,H,W]',80,32,'#4caf50',10);
if(p>.2){arr(80,45,80,60,'#555');RR(20,65,120,25,4,'#1a1e2e','#2196f3');txt('ViT → CLS [B,D]',80,82,'#2196f3',10)}
if(p>.4){arr(80,95,80,110,'#555');RR(20,115,120,25,4,'#1a1e2e','#ff9800');txt('Sigmoid [B,8]',80,132,'#ff9800',10)}
if(p>.6){const cats=['NSFW','暴力','垃圾','仇恨','自残','恐怖','违禁','正常'];const cs=['#f44','#e91','#ff9','#9c2','#795','#607','#ff5','#4ca'];
for(let i=0;i<8;i++){const ap=Math.min(1,(p-.6)*4-i*.15);if(ap<=0)continue;ctx.globalAlpha=Math.min(1,ap);
const y=160+i*20;RR(20,y,50,15,3,cs[i]+'33',cs[i]);txt(cats[i],45,y+12,cs[i],9);
const barW=60*Math.random()*ap;RR(80,y+2,barW,11,3,cs[i]+'66');ctx.globalAlpha=1}}}},

{title:"AdversarialAttacker.pgd",info:"PGD = 多步迭代 FGSM + 投影回 ε-ball",
code:[{text:'def pgd(self, model, images, labels):',hl:true},{text:'    adv = images + uniform(-ε, ε)',hl:true},{text:'    adv = adv.clamp(0, 1)',hl:false},{text:'    ',hl:false},{text:'    for step in range(attack_steps):',hl:true},{text:'        adv.requires_grad_(True)',hl:false},{text:'        loss = loss_fn(model(adv), labels)',hl:false},{text:'        loss.backward()',hl:false},{text:'        ',hl:false},{text:'        # 梯度符号方向迈步',hl:false},{text:'        adv = adv + α·sign(grad)',hl:true},{text:'        ',hl:false},{text:'        # 投影回 ε-ball',hl:true},{text:'        delta = clamp(adv-x, -ε, ε)',hl:false},{text:'        adv = clamp(x+delta, 0, 1)',hl:false}],
render(p){ctx.clearRect(0,0,W,H);const cx=W/2,cy=H/2-20;
ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,cy,80,0,Math.PI*2);ctx.stroke();
txt('ε-ball',cx,cy-90,'#aaa',11);
ctx.fillStyle='#4caf50';ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fill();txt('x₀',cx+15,cy-5,'#4caf50',10);
if(p>.2){const steps=Math.min(5,Math.floor(p*6));let px=cx,py=cy;
for(let i=0;i<steps;i++){const angle=.8+i*1.1,dist=15+i*12;const nx=cx+dist*Math.cos(angle),ny=cy-dist*Math.sin(angle);
const bounded=Math.sqrt((nx-cx)**2+(ny-cy)**2)>80;ctx.strokeStyle=bounded?'#f44336':'#ff9800';ctx.lineWidth=1.5;
ctx.beginPath();ctx.moveTo(px,py);if(bounded){const a=Math.atan2(ny-cy,nx-cx);ctx.lineTo(cx+78*Math.cos(a),cy+78*Math.sin(a))}else ctx.lineTo(nx,ny);
ctx.stroke();px=bounded?cx+78*Math.cos(Math.atan2(ny-cy,nx-cx)):nx;py=bounded?cy+78*Math.sin(Math.atan2(ny-cy,nx-cx)):ny;
ctx.fillStyle='#f44336';ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fill()}}
if(p>.8){txt('x_adv',px+15,py+5,'#f44336',10);txt('投影保证扰动 ≤ ε',cx,cy+100,'#ef9a9a',11)}}},

{title:"WatermarkEmbedder.forward",info:"嵌入 → 检测 → 比特准确率",
code:[{text:'def forward(self, images, watermark):',hl:true},{text:'    # 1. 嵌入水印',hl:false},{text:'    residual = self.embed_net(images)',hl:true},{text:'    watermarked = images + α*residual',hl:true},{text:'    watermarked = watermarked.clamp(0,1)',hl:false},{text:'    ',hl:false},{text:'    # 2. 检测水印',hl:false},{text:'    logits = self.detector(watermarked)',hl:true},{text:'    ',hl:false},{text:'    # 3. 比特准确率',hl:false},{text:'    pred = (logits > 0)',hl:true},{text:'    orig = (watermark > 0)',hl:false},{text:'    bit_acc = (pred == orig).mean()',hl:true}],
render(p){ctx.clearRect(0,0,W,H);const cx=W/2;
const blocks=[{n:'原图',c:'#4caf50'},{n:'+ α·residual',c:'#ff9800'},{n:'水印图',c:'#2196f3'},{n:'检测器',c:'#f44336'},{n:'比特',c:'#ef9a9a'}];
blocks.forEach((b,i)=>{const prog=Math.min(1,p*(blocks.length+1)/(i+1));if(prog<=0)return;ctx.globalAlpha=Math.min(1,prog);
const y=10+i*40;RR(20,y,120,28,4,'#1a1e2e',b.c);txt(b.n,80,y+18,b.c,11);if(i>0)arr(80,10+(i-1)*40+32,80,y-2,'#555');ctx.globalAlpha=1});
if(p>.8){txt('bit_acc → 量化鲁棒性',cx+80,H/2,'#ef9a9a',11)}}},

{title:"SafetyGuardModel.forward",info:"输入清洗 → 快速分类 → 级联决策",
code:[{text:'def forward(self, images):',hl:true},{text:'    # 1. 高斯平滑消除对抗扰动',hl:false},{text:'    sanitized = self.sanitizer(images)',hl:true},{text:'    ',hl:false},{text:'    # 2. 快速安全分类',hl:false},{text:'    probs = self.classifier(sanitized)',hl:true},{text:'    max_prob = probs.max(dim=-1)',hl:false},{text:'    ',hl:false},{text:'    # 3. 级联决策',hl:true},{text:'    if max_prob > 0.9: reject',hl:false},{text:'    if max_prob < 0.3: accept',hl:false},{text:'    else: escalate to deep model',hl:false}],
render(p){ctx.clearRect(0,0,W,H);const cx=W/2;
const stages=[{n:'Sanitizer',c:'#ff9800'},{n:'Fast Classifier',c:'#2196f3'},{n:'Decision',c:'#f44336'}];
stages.forEach((s,i)=>{const prog=Math.min(1,p*4-i);if(prog<=0)return;ctx.globalAlpha=Math.min(1,prog);
const y=15+i*50;RR(20,y,140,35,4,'#1a1e2e',s.c);txt(s.n,90,y+22,s.c,11);if(i>0)arr(90,15+(i-1)*50+40,90,y-2,'#555');ctx.globalAlpha=1});
if(p>.7){const labels=[{t:'Reject',c:'#f44336',y:180},{t:'Accept',c:'#4caf50',y:205},{t:'Escalate',c:'#ff9800',y:230}];
labels.forEach((l,i)=>{const ap=Math.min(1,(p-.7)*4-i*.2);if(ap<=0)return;ctx.globalAlpha=Math.min(1,ap);
RR(50,l.y,80,18,3,l.c+'33',l.c);txt(l.t,90,l.y+13,l.c,10);ctx.globalAlpha=1})}}},

{title:"CalibratedClassifier.compute_ece",info:"分桶计算置信度-准确率差距 → ECE",
code:[{text:'def compute_ece(self, probs, labels, n=10):',hl:true},{text:'    bins = linspace(0, 1, n+1)',hl:false},{text:'    ece = 0',hl:false},{text:'    ',hl:false},{text:'    for i in range(n):',hl:true},{text:'        mask = (probs > lo) & (probs <= hi)',hl:false},{text:'        if mask.sum() > 0:',hl:false},{text:'            conf = probs[mask].mean()',hl:true},{text:'            acc = labels[mask].mean()',hl:true},{text:'            ece += |B|/N * |conf-acc|',hl:true},{text:'    ',hl:false},{text:'    return ece  # lower is better',hl:true}],
render(p){ctx.clearRect(0,0,W,H);const bins=8;
const ox=30,oy=10,pw=W-60,ph=H-60;
ctx.strokeStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox,oy+ph);ctx.lineTo(ox+pw,oy+ph);ctx.stroke();
ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(ox,oy+ph);ctx.lineTo(ox+pw,oy);ctx.stroke();ctx.setLineDash([]);
txt('Confidence',ox+pw/2,oy+ph+15,'#aaa',10);
for(let i=0;i<bins;i++){const ap=Math.min(1,p*2-i*.15);if(ap<=0)continue;ctx.globalAlpha=Math.min(1,ap);
const bw=pw/bins-4,x=ox+i*(pw/bins)+2;const conf=(i+.5)/bins;const acc=conf*.75+.1;
const barH=acc*ph*ap;RR(x,oy+ph-barH,bw,barH,2,'#f4433666','#f44336');
const idealH=conf*ph*ap;ctx.strokeStyle='#4caf5066';ctx.setLineDash([2,2]);ctx.beginPath();ctx.moveTo(x,oy+ph-idealH);ctx.lineTo(x+bw,oy+ph-idealH);ctx.stroke();ctx.setLineDash([]);
ctx.globalAlpha=1}
if(p>.8){txt('红色=实际  绿线=理想  差距=ECE',ox+pw/2,oy+ph+30,'#ef9a9a',10)}}}
];

function renderCode(){const p=document.getElementById('codePanel');p.innerHTML='';steps[currentStep].code.forEach(l=>{const d=document.createElement('div');d.className='code-line'+(l.hl?' highlight':'');d.textContent=l.text;p.appendChild(d)})}
function animate(){animProgress+=.015;if(animProgress>1)animProgress=1;steps[currentStep].render(animProgress);if(animProgress<1)animId=requestAnimationFrame(animate)}
function goToStep(s){currentStep=Math.max(0,Math.min(steps.length-1,s));animProgress=0;if(animId)cancelAnimationFrame(animId);animate();updateUI()}
function nextStep(){if(currentStep<steps.length-1)goToStep(currentStep+1)}function prevStep(){if(currentStep>0)goToStep(currentStep-1)}
function replay(){animProgress=0;if(animId)cancelAnimationFrame(animId);animate()}
function updateUI(){document.getElementById('infoTitle').textContent=steps[currentStep].title;document.getElementById('infoText').textContent=steps[currentStep].info;document.getElementById('stepCounter').textContent=`Step ${currentStep+1}/${steps.length}`;document.getElementById('prevBtn').disabled=currentStep===0;document.getElementById('nextBtn').disabled=currentStep===steps.length-1;document.querySelectorAll('.dot').forEach((d,i)=>{d.className='dot'+(i===currentStep?' active':(i<currentStep?' done':''))});renderCode()}
function init(){const d=document.getElementById('dots');steps.forEach((_,i)=>{const dot=document.createElement('div');dot.className='dot'+(i===0?' active':'');dot.onclick=()=>goToStep(i);d.appendChild(dot)});updateUI();animate()}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nextStep();if(e.key==='ArrowLeft')prevStep()});init();
</script></body></html>
