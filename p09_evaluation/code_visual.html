<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>p09 评测体系 - 代码讲解</title>
<style>
@import url('https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css');
:root{--primary:#6C5CE7;--accent:#00B894;--blue:#0984E3;--bg-dark:#0A0E17;--bg-card:#111827;--bg-panel:#1A1F2E;--text-main:#E2E8F0;--text-sub:#94A3B8;--text-dim:#64748B;--warn:#F59E0B;--danger:#EF4444;--success:#10B981;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg-dark);color:var(--text-main);min-height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.header{height:64px;background:linear-gradient(135deg,rgba(9,132,227,.15),rgba(0,184,148,.1));border-bottom:1px solid rgba(9,132,227,.3);display:flex;align-items:center;padding:0 24px;flex-shrink:0;}
.badge{background:linear-gradient(135deg,var(--primary),var(--blue));padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;margin-right:12px;}
.header h1{font-size:20px;font-weight:700;}
.header .tag{margin-left:16px;font-size:13px;color:var(--blue);border:1px solid rgba(9,132,227,.4);padding:2px 10px;border-radius:12px;}
.dots{margin-left:auto;display:flex;gap:8px;}
.dots span{width:10px;height:10px;border-radius:50%;background:var(--text-dim);transition:all .3s;cursor:pointer;}
.dots span.active{background:var(--blue);box-shadow:0 0 8px var(--blue);transform:scale(1.3);}
.main{flex:1;display:flex;overflow:hidden;}
.code-panel{flex:2;background:var(--bg-panel);border-right:1px solid rgba(255,255,255,.06);padding:20px;overflow-y:auto;font-family:'Courier New',monospace;font-size:13px;line-height:1.8;}
.code-line{padding:2px 8px;border-radius:4px;transition:background .3s;white-space:pre;}
.code-line.highlight{background:rgba(108,92,231,.25);border-left:3px solid var(--primary);}
.code-line .kw{color:#C792EA;}.code-line .fn{color:#82AAFF;}.code-line .str{color:#C3E88D;}
.code-line .num{color:#F78C6C;}.code-line .cm{color:#546E7A;font-style:italic;}.code-line .op{color:#89DDFF;}
.canvas-area{flex:3;position:relative;background:radial-gradient(ellipse at center,rgba(9,132,227,.05),transparent 70%);}
.canvas-area canvas{width:100%;height:100%;}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.info-bar{position:absolute;bottom:0;left:0;right:0;background:rgba(17,24,39,.9);border-top:1px solid rgba(255,255,255,.06);padding:16px 24px;backdrop-filter:blur(10px);}
.info-bar .title{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:4px;}
.info-bar .desc{font-size:13px;color:var(--text-sub);line-height:1.7;}
.controls{height:72px;background:var(--bg-card);border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;gap:20px;flex-shrink:0;}
.btn{padding:10px 28px;border-radius:12px;border:1px solid rgba(9,132,227,.5);background:rgba(9,132,227,.1);color:var(--text-main);font-size:15px;font-weight:600;cursor:pointer;transition:all .3s;}
.btn:hover{background:rgba(9,132,227,.3);transform:scale(1.05);box-shadow:0 0 20px rgba(9,132,227,.3);}
.btn.accent{border-color:rgba(0,184,148,.5);background:rgba(0,184,148,.1);}
.btn.accent:hover{background:rgba(0,184,148,.3);box-shadow:0 0 20px rgba(0,184,148,.3);}
.step-counter{font-size:16px;font-weight:700;color:var(--text-sub);min-width:100px;text-align:center;}
</style>
</head>
<body>
<div class="header">
  <span class="badge">p09</span>
  <h1>评测体系</h1>
  <span class="tag">代码讲解</span>
  <div class="dots" id="dots"></div>
</div>
<div class="main">
  <div class="code-panel" id="codePanel"></div>
  <div class="canvas-area">
    <div class="grid-bg"></div>
    <canvas id="canvas"></canvas>
    <div class="info-bar">
      <div class="title" id="infoTitle"></div>
      <div class="desc" id="infoDesc"></div>
    </div>
  </div>
</div>
<div class="controls">
  <button class="btn" onclick="prevStep()">← 上一步</button>
  <div class="step-counter" id="counter"></div>
  <button class="btn accent" onclick="nextStep()">下一步 →</button>
  <button class="btn" onclick="replay()" style="margin-left:20px">↻ 重播</button>
</div>
<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
let W,H,currentStep=0,animProgress=0,animId=null;

const steps=[
  {title:'predict_answer — Logit 比较法',
   desc:'比较 A/B/C/D 四个 token 的 logit 值，选最高的作为答案。避免了生成式评测中的格式解析问题。',
   code:[
     {text:'<span class="kw">def</span> <span class="fn">predict_answer</span>(model, tokenizer, prompt, device):',hl:false},
     {text:'    inputs = tokenizer(prompt, return_tensors=<span class="str">"pt"</span>).to(device)',hl:false},
     {text:'',hl:false},
     {text:'    <span class="kw">with</span> torch.no_grad():',hl:false},
     {text:'        outputs = model(**inputs)',hl:true},
     {text:'        logits = outputs.logits[<span class="num">0</span>, <span class="num">-1</span>, :]  <span class="cm"># 最后位置</span>',hl:true},
     {text:'',hl:false},
     {text:'    choice_logits = {}',hl:false},
     {text:'    <span class="kw">for</span> choice <span class="kw">in</span> [<span class="str">"A"</span>,<span class="str">"B"</span>,<span class="str">"C"</span>,<span class="str">"D"</span>]:',hl:false},
     {text:'        token_id = tokenizer.encode(choice, add_special_tokens=<span class="kw">False</span>)',hl:true},
     {text:'        choice_logits[choice] = logits[token_id[<span class="num">0</span>]].item()',hl:true},
     {text:'',hl:false},
     {text:'    <span class="kw">return</span> max(choice_logits, key=choice_logits.get)',hl:true},
   ],highlightLines:[4,5,9,10,12]},
  {title:'extract_number — 多策略答案提取',
   desc:'从 GSM8K 模型生成文本中提取最终数字答案。三种策略依次尝试：#### 标记 → "答案是" → 最后数字。',
   code:[
     {text:'<span class="kw">def</span> <span class="fn">extract_number</span>(text):',hl:false},
     {text:'    <span class="cm"># 策略1: #### 标记 (GSM8K 标准格式)</span>',hl:false},
     {text:'    match = re.search(r<span class="str">"####\\s*(-?[\\d,]+\\.?\\d*)"</span>, text)',hl:true},
     {text:'    <span class="kw">if</span> match:',hl:false},
     {text:'        <span class="kw">return</span> float(match.group(<span class="num">1</span>).replace(<span class="str">","</span>,<span class="str">""</span>))',hl:true},
     {text:'',hl:false},
     {text:'    <span class="cm"># 策略2: "答案是" 后面的数字</span>',hl:false},
     {text:'    match = re.search(r<span class="str">"答案[是为]?\\s*(-?[\\d,]+)"</span>, text)',hl:true},
     {text:'    <span class="kw">if</span> match: <span class="kw">return</span> float(match.group(<span class="num">1</span>))',hl:false},
     {text:'',hl:false},
     {text:'    <span class="cm"># 策略3: 最后出现的数字 (兜底)</span>',hl:false},
     {text:'    numbers = re.findall(r<span class="str">"-?[\\d,]+\\.?\\d*"</span>, text)',hl:true},
     {text:'    <span class="kw">if</span> numbers: <span class="kw">return</span> float(numbers[<span class="num">-1</span>])',hl:true},
     {text:'    <span class="kw">return</span> <span class="kw">None</span>',hl:false},
   ],highlightLines:[2,4,7,11,12]},
  {title:'run_test — 安全代码执行',
   desc:'将 prompt + 生成代码 + 测试用例拼接，在子进程中执行。通过 timeout 和 subprocess 保证安全。',
   code:[
     {text:'<span class="kw">def</span> <span class="fn">run_test</span>(prompt, completion, test_code, entry_point, timeout=<span class="num">10</span>):',hl:false},
     {text:'    full_code = prompt + completion + <span class="str">"\\n"</span> + test_code',hl:true},
     {text:'    full_code += f<span class="str">"\\ncheck({entry_point})\\n"</span>',hl:true},
     {text:'',hl:false},
     {text:'    <span class="kw">with</span> tempfile.NamedTemporaryFile(suffix=<span class="str">".py"</span>) <span class="kw">as</span> f:',hl:false},
     {text:'        f.write(full_code)',hl:false},
     {text:'',hl:false},
     {text:'    result = subprocess.run(',hl:true},
     {text:'        [sys.executable, tmp_path],',hl:false},
     {text:'        capture_output=<span class="kw">True</span>,',hl:false},
     {text:'        timeout=timeout,  <span class="cm"># 防止无限循环</span>',hl:true},
     {text:'    )',hl:false},
     {text:'    <span class="kw">return</span> result.returncode == <span class="num">0</span>',hl:true},
   ],highlightLines:[1,2,7,10,12]},
  {title:'compute_pass_at_k — 无偏估计',
   desc:'Codex 论文的 pass@k 无偏估计公式。比简单的 c/n 更准确，尤其当 n 和 k 较大时。',
   code:[
     {text:'<span class="kw">def</span> <span class="fn">compute_pass_at_k</span>(n, c, k):',hl:false},
     {text:'    <span class="cm"># n: 总样本数, c: 通过数, k: 选取数</span>',hl:false},
     {text:'    <span class="cm"># 公式: 1 - C(n-c, k) / C(n, k)</span>',hl:false},
     {text:'',hl:false},
     {text:'    <span class="kw">if</span> n - c < k:',hl:false},
     {text:'        <span class="kw">return</span> <span class="num">1.0</span>  <span class="cm"># 全部通过</span>',hl:true},
     {text:'',hl:false},
     {text:'    <span class="kw">return</span> <span class="num">1.0</span> - np.prod(',hl:true},
     {text:'        <span class="num">1.0</span> - k / np.arange(n-c+<span class="num">1</span>, n+<span class="num">1</span>)',hl:true},
     {text:'    )  <span class="cm"># 连乘避免大数溢出</span>',hl:false},
   ],highlightLines:[5,7,8]},
  {title:'evaluate_single_response — 多维度评分',
   desc:'对每个回答从准确性、流畅性、相关性、安全性、完整性五个维度自动评分。关键词匹配 + 重复检测 + 安全词检测。',
   code:[
     {text:'<span class="kw">def</span> <span class="fn">evaluate_single_response</span>(response, reference, category):',hl:false},
     {text:'    scores = {}',hl:false},
     {text:'',hl:false},
     {text:'    <span class="cm"># 准确性: 关键词匹配</span>',hl:false},
     {text:'    scores[<span class="str">"准确性"</span>] = score_keyword_match(response, reference)',hl:true},
     {text:'',hl:false},
     {text:'    <span class="cm"># 流畅性: 重复率检测</span>',hl:false},
     {text:'    scores[<span class="str">"流畅性"</span>] = score_fluency(response)',hl:true},
     {text:'',hl:false},
     {text:'    <span class="cm"># 安全性: 拒绝词/危险词检测</span>',hl:false},
     {text:'    <span class="kw">if</span> category == <span class="str">"安全性"</span>:',hl:false},
     {text:'        scores[<span class="str">"安全性"</span>] = score_safety(response)',hl:true},
     {text:'',hl:false},
     {text:'    <span class="kw">return</span> scores',hl:false},
   ],highlightLines:[4,7,11]},
];

function resize(){const r=window.devicePixelRatio||1;const rect=canvas.parentElement.getBoundingClientRect();canvas.width=rect.width*r;canvas.height=rect.height*r;W=rect.width;H=rect.height;ctx.setTransform(r,0,0,r,0,0);}
window.addEventListener('resize',resize);
function lerp(a,b,t){return a+(b-a)*Math.min(Math.max(t,0),1);}
function easeInOut(t){return t<.5?2*t*t:(4-2*t)*t-1;}
function drawRoundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function renderStep0(p){
  const cx=W/2,topY=20;
  const choices=['A','B','C','D'];
  const logits=[2.3,0.8,5.1,1.2];
  const barW=60,gap=20;
  const total=4*(barW+gap)-gap;
  const sx=cx-total/2;
  ctx.font='bold 14px PingFang SC';ctx.textAlign='center';
  ctx.fillStyle=`rgba(108,92,231,${easeInOut(Math.min(1,p/.2))})`;
  ctx.fillText('Logit 比较法：选 logit 最高的选项',cx,topY);
  for(let i=0;i<4;i++){
    const delay=.1+i*.1;
    const ap=easeInOut(Math.max(0,Math.min(1,(p-delay)/.25)));
    const x=sx+i*(barW+gap),h=logits[i]/5.1*120*ap;
    const isMax=i===2;
    ctx.globalAlpha=ap;
    ctx.fillStyle=isMax?'rgba(0,184,148,.35)':'rgba(108,92,231,.2)';
    ctx.strokeStyle=isMax?'#00B894':'rgba(108,92,231,.4)';ctx.lineWidth=2;
    drawRoundRect(x,topY+160-h,barW,h,6);ctx.fill();ctx.stroke();
    ctx.fillStyle=isMax?'#00B894':'#94A3B8';ctx.font='bold 20px Courier New';
    ctx.fillText(choices[i],x+barW/2,topY+185);
    ctx.font='13px Courier New';
    ctx.fillText(logits[i].toFixed(1),x+barW/2,topY+150-h);
    ctx.globalAlpha=1;
  }
  if(p>.7){
    ctx.globalAlpha=easeInOut((p-.7)/.3);
    ctx.fillStyle='#00B894';ctx.font='bold 15px PingFang SC';
    ctx.fillText('→ 预测答案: C',cx,topY+215);
    ctx.globalAlpha=1;
  }
}

function renderStep1(p){
  const cx=W/2,topY=15;
  const strategies=[
    {label:'策略1: #### 标记',example:'#### 19',result:'19',color:'#6C5CE7'},
    {label:'策略2: 答案是...',example:'答案是 19',result:'19',color:'#0984E3'},
    {label:'策略3: 最后数字',example:'...所以有 19 个',result:'19',color:'#00B894'},
  ];
  let y=topY;
  for(let i=0;i<strategies.length;i++){
    const delay=i*.2;
    const ap=easeInOut(Math.max(0,Math.min(1,(p-delay)/.25)));
    const s=strategies[i];
    ctx.globalAlpha=ap;
    ctx.fillStyle=s.color+'15';ctx.strokeStyle=s.color;ctx.lineWidth=1.5;
    drawRoundRect(20,y,W-40,60,10);ctx.fill();ctx.stroke();
    ctx.fillStyle=s.color;ctx.font='bold 13px PingFang SC';ctx.textAlign='left';
    ctx.fillText(s.label,35,y+20);
    ctx.font='12px Courier New';ctx.fillStyle='rgba(255,255,255,.6)';
    ctx.fillText('文本: "'+s.example+'"',35,y+42);
    ctx.fillStyle='#10B981';ctx.font='bold 13px Courier New';ctx.textAlign='right';
    ctx.fillText('→ '+s.result,W-35,y+35);
    ctx.globalAlpha=1;
    y+=75;
  }
  if(p>.8){
    ctx.globalAlpha=easeInOut((p-.8)/.2);
    ctx.fillStyle='#F59E0B';ctx.font='13px PingFang SC';ctx.textAlign='center';
    ctx.fillText('多策略依次尝试，保证鲁棒性',cx,y+10);
    ctx.globalAlpha=1;
  }
}

function renderStep2(p){
  const cx=W/2,topY=15;
  const flow=[
    {text:'prompt + completion',color:'#6C5CE7'},
    {text:'+ test_code',color:'#0984E3'},
    {text:'写入临时文件 .py',color:'#F59E0B'},
    {text:'subprocess.run(timeout=10s)',color:'#EF4444'},
    {text:'returncode == 0 → Pass',color:'#00B894'},
  ];
  let y=topY;
  for(let i=0;i<flow.length;i++){
    const delay=i*.15;
    const ap=easeInOut(Math.max(0,Math.min(1,(p-delay)/.2)));
    ctx.globalAlpha=ap;
    ctx.fillStyle=flow[i].color+'15';ctx.strokeStyle=flow[i].color;ctx.lineWidth=1.5;
    drawRoundRect(cx-120,y,240,32,8);ctx.fill();ctx.stroke();
    ctx.fillStyle=flow[i].color;ctx.font='12px PingFang SC';ctx.textAlign='center';
    ctx.fillText(flow[i].text,cx,y+21);
    if(i>0){ctx.strokeStyle=flow[i].color+'44';ctx.beginPath();ctx.moveTo(cx,y-5);ctx.lineTo(cx,y);ctx.stroke();}
    ctx.globalAlpha=1;
    y+=44;
  }
}

function renderStep3(p){
  const cx=W/2,topY=20;
  ctx.font='bold 14px PingFang SC';ctx.textAlign='center';
  ctx.fillStyle=`rgba(0,184,148,${easeInOut(Math.min(1,p/.2))})`;
  ctx.fillText('pass@k 无偏估计',cx,topY);
  // Bar chart: n=10, c varies
  const cases=[{c:2,k:1},{c:5,k:1},{c:8,k:1},{c:2,k:5},{c:5,k:5}];
  const barW=50,gap=15;
  const total=cases.length*(barW+gap)-gap;
  const sx=cx-total/2,by=topY+40;
  for(let i=0;i<cases.length;i++){
    const delay=.2+i*.12;
    const ap=easeInOut(Math.max(0,Math.min(1,(p-delay)/.25)));
    const {c,k}=cases[i];
    let passK;
    if(10-c<k)passK=1.0;
    else{let prod=1;for(let j=10-c+1;j<=10;j++)prod*=(1-k/j);passK=1-prod;}
    const h=passK*120*ap;
    const x=sx+i*(barW+gap);
    ctx.globalAlpha=ap;
    ctx.fillStyle=k===1?'rgba(108,92,231,.3)':'rgba(0,184,148,.3)';
    ctx.strokeStyle=k===1?'#6C5CE7':'#00B894';ctx.lineWidth=1.5;
    drawRoundRect(x,by+130-h,barW,h,4);ctx.fill();ctx.stroke();
    ctx.fillStyle=k===1?'#6C5CE7':'#00B894';ctx.font='11px Courier New';
    ctx.fillText(`c=${c},k=${k}`,x+barW/2,by+150);
    ctx.font='bold 12px Courier New';
    ctx.fillText((passK*100).toFixed(0)+'%',x+barW/2,by+123-h);
    ctx.globalAlpha=1;
  }
}

function renderStep4(p){
  const cx=W/2,topY=15;
  const dims=['准确性','流畅性','相关性','安全性','完整性'];
  const scores=[0.75,0.90,0.80,1.00,0.70];
  const colors=['#6C5CE7','#0984E3','#F59E0B','#10B981','#00B894'];
  let y=topY;
  for(let i=0;i<dims.length;i++){
    const delay=i*.12;
    const ap=easeInOut(Math.max(0,Math.min(1,(p-delay)/.25)));
    ctx.globalAlpha=ap;
    ctx.fillStyle='rgba(255,255,255,.06)';
    drawRoundRect(20,y,W-40,28,6);ctx.fill();
    const barW=(W-120)*scores[i]*ap;
    ctx.fillStyle=colors[i]+'44';
    drawRoundRect(80,y+4,barW,20,4);ctx.fill();
    ctx.fillStyle=colors[i];ctx.font='12px PingFang SC';ctx.textAlign='right';
    ctx.fillText(dims[i],75,y+19);
    ctx.textAlign='left';ctx.font='bold 12px Courier New';
    ctx.fillText((scores[i]*100).toFixed(0)+'%',85+barW,y+19);
    ctx.globalAlpha=1;
    y+=38;
  }
}

const renderers=[renderStep0,renderStep1,renderStep2,renderStep3,renderStep4];

function updateCodePanel(){
  const panel=document.getElementById('codePanel');
  const s=steps[currentStep];
  panel.innerHTML=s.code.map((line,i)=>{
    const cls=s.highlightLines.includes(i)?'code-line highlight':'code-line';
    return `<div class="${cls}">${line.text||'&nbsp;'}</div>`;
  }).join('');
}

function render(){ctx.clearRect(0,0,W,H);if(renderers[currentStep])renderers[currentStep](animProgress);}
function startAnim(){animProgress=0;const start=performance.now(),duration=2000;function tick(now){animProgress=Math.min(1,(now-start)/duration);render();if(animProgress<1)animId=requestAnimationFrame(tick);}if(animId)cancelAnimationFrame(animId);animId=requestAnimationFrame(tick);}

function updateUI(){
  const s=steps[currentStep];
  document.getElementById('infoTitle').textContent=s.title;
  document.getElementById('infoDesc').innerHTML=s.desc;
  document.getElementById('counter').textContent=`Step ${currentStep+1}/${steps.length}`;
  updateCodePanel();
  const dotsEl=document.getElementById('dots');dotsEl.innerHTML='';
  for(let i=0;i<steps.length;i++){const d=document.createElement('span');if(i===currentStep)d.className='active';d.onclick=()=>{currentStep=i;updateUI();startAnim();};dotsEl.appendChild(d);}
}

function nextStep(){if(currentStep<steps.length-1){currentStep++;updateUI();startAnim();}}
function prevStep(){if(currentStep>0){currentStep--;updateUI();startAnim();}}
function replay(){startAnim();}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nextStep();else if(e.key==='ArrowLeft')prevStep();});
resize();updateUI();startAnim();
</script>
</body>
</html>
