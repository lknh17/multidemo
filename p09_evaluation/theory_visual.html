<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>p09 评测体系 - 原理可视化</title>
<style>
@import url('https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css');
:root{--primary:#6C5CE7;--accent:#00B894;--blue:#0984E3;--bg-dark:#0A0E17;--bg-card:#111827;--bg-panel:#1A1F2E;--text-main:#E2E8F0;--text-sub:#94A3B8;--text-dim:#64748B;--warn:#F59E0B;--danger:#EF4444;--success:#10B981;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg-dark);color:var(--text-main);min-height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.header{height:64px;background:linear-gradient(135deg,rgba(108,92,231,.15),rgba(0,184,148,.1));border-bottom:1px solid rgba(108,92,231,.3);display:flex;align-items:center;padding:0 24px;flex-shrink:0;backdrop-filter:blur(10px);}
.badge{background:linear-gradient(135deg,var(--primary),var(--blue));padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;margin-right:12px;}
.header h1{font-size:20px;font-weight:700;}
.header .tag{margin-left:16px;font-size:13px;color:var(--accent);border:1px solid rgba(0,184,148,.4);padding:2px 10px;border-radius:12px;}
.dots{margin-left:auto;display:flex;gap:8px;}
.dots span{width:10px;height:10px;border-radius:50%;background:var(--text-dim);transition:all .3s;cursor:pointer;}
.dots span.active{background:var(--accent);box-shadow:0 0 8px var(--accent);transform:scale(1.3);}
.main{flex:1;display:flex;overflow:hidden;}
.canvas-area{flex:3;position:relative;background:radial-gradient(ellipse at center,rgba(108,92,231,.05),transparent 70%);}
.canvas-area canvas{width:100%;height:100%;}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.info-panel{flex:2;background:var(--bg-card);border-left:1px solid rgba(255,255,255,.06);padding:28px;overflow-y:auto;display:flex;flex-direction:column;}
.step-title{font-size:22px;font-weight:700;margin-bottom:12px;background:linear-gradient(90deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.step-desc{font-size:15px;line-height:1.9;color:var(--text-sub);}
.step-desc strong{color:var(--accent);}
.formula-box{background:var(--bg-panel);border:1px solid rgba(108,92,231,.3);border-radius:12px;padding:16px 20px;margin:16px 0;font-family:'Courier New',monospace;font-size:15px;color:var(--warn);text-align:center;line-height:1.8;}
.controls{height:72px;background:var(--bg-card);border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;gap:20px;flex-shrink:0;}
.btn{padding:10px 28px;border-radius:12px;border:1px solid rgba(108,92,231,.5);background:rgba(108,92,231,.1);color:var(--text-main);font-size:15px;font-weight:600;cursor:pointer;transition:all .3s;}
.btn:hover{background:rgba(108,92,231,.3);transform:scale(1.05);box-shadow:0 0 20px rgba(108,92,231,.3);}
.btn.accent{border-color:rgba(0,184,148,.5);background:rgba(0,184,148,.1);}
.btn.accent:hover{background:rgba(0,184,148,.3);box-shadow:0 0 20px rgba(0,184,148,.3);}
.step-counter{font-size:16px;font-weight:700;color:var(--text-sub);min-width:100px;text-align:center;}
</style>
</head>
<body>
<div class="header">
  <span class="badge">p09</span>
  <h1>评测体系</h1>
  <span class="tag">原理可视化</span>
  <div class="dots" id="dots"></div>
</div>
<div class="main">
  <div class="canvas-area">
    <div class="grid-bg"></div>
    <canvas id="canvas"></canvas>
  </div>
  <div class="info-panel">
    <div class="step-title" id="stepTitle"></div>
    <div class="step-desc" id="stepDesc"></div>
    <div class="formula-box" id="formulaBox" style="display:none"></div>
  </div>
</div>
<div class="controls">
  <button class="btn" onclick="prevStep()">← 上一步</button>
  <div class="step-counter" id="counter">Step 1/6</div>
  <button class="btn accent" onclick="nextStep()">下一步 →</button>
  <button class="btn" onclick="replay()" style="margin-left:20px">↻ 重播</button>
</div>
<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
let W,H,currentStep=0,animProgress=0,animId=null;

const steps=[
  {title:'评测范式总览',
   desc:'大模型评测有四种主流范式：<strong>选择题评测</strong>（MMLU/C-Eval）、<strong>生成式评测</strong>（GSM8K）、<strong>执行式评测</strong>（HumanEval）、<strong>人工评测</strong>（Arena）。<br><br>不同范式适用于不同的能力维度，完整的评测体系需要<strong>多范式组合</strong>。<br><br>动画展示四种范式的特点和适用场景。',
   formula:'综合评分 = Σ(w_i × score_i)\n其中 w_i 为各维度权重'},
  {title:'Logit 比较法（MMLU/C-Eval）',
   desc:'选择题评测的标准方法：不让模型生成答案，而是比较 A/B/C/D 四个 token 在最后位置的 <strong>logit 值</strong>。<br><br>Logit 最高的选项即为模型的答案。这种方法<strong>稳定、可复现</strong>，避免了解析生成文本的麻烦。<br><br>动画展示 logit 比较的工作流程。',
   formula:'P(answer=k) = softmax(z_k)\n选择 argmax(z_A, z_B, z_C, z_D)'},
  {title:'Chain-of-Thought（GSM8K）',
   desc:'数学推理评测要求模型展示<strong>推理过程</strong>。CoT 提示让模型"一步一步思考"，显著提升推理准确率。<br><br>关键挑战是从生成文本中<strong>提取最终答案</strong>：查找 #### 标记、"答案是"后的数字、或最后出现的数字。<br><br>动画展示 CoT 推理和答案提取流程。',
   formula:'Prompt: "让我们一步一步来思考"\n答案提取: text → regex → number'},
  {title:'代码执行评测（HumanEval）',
   desc:'代码评测最接近实际应用：给定函数签名，模型生成代码，通过<strong>运行测试用例</strong>验证正确性。<br><br>pass@k 衡量"生成 k 次至少对一次"的概率。安全执行需要<strong>沙箱环境 + 超时限制</strong>。<br><br>动画展示代码生成和测试执行流程。',
   formula:'pass@k = 1 - C(n-c,k) / C(n,k)\nn=总样本, c=通过数, k=选取数'},
  {title:'雷达图：五阶段能力对比',
   desc:'将各评测分数汇总为<strong>雷达图</strong>，直观展示五个训练阶段在知识、对话、数学、代码、安全五个维度的变化。<br><br>预期趋势：<strong>SFT</strong> 提升对话能力，<strong>DPO</strong> 提升安全性，<strong>RL</strong> 提升数学推理。<br><br>动画展示五阶段雷达图的逐步扩展。',
   formula:'base → pretrain → SFT → DPO → RL\n各维度分数逐步提升'},
  {title:'Benchmark 泄露与评测陷阱',
   desc:'评测中最大的陷阱是 <strong>Benchmark 泄露</strong>：训练数据包含评测题目，导致分数虚高。<br><br>其他陷阱包括：<strong>Prompt 敏感性</strong>（不同格式差异大）、<strong>样本量不足</strong>（方差大）、<strong>过拟合评测集</strong>。<br><br>动画展示泄露检测和应对策略。',
   formula:'检测方法: N-gram重叠 / Canary String\n应对: 多benchmark + 定期更新 + 人工评测'},
];

function resize(){const r=window.devicePixelRatio||1;const rect=canvas.parentElement.getBoundingClientRect();canvas.width=rect.width*r;canvas.height=rect.height*r;W=rect.width;H=rect.height;ctx.setTransform(r,0,0,r,0,0);}
window.addEventListener('resize',resize);
function lerp(a,b,t){return a+(b-a)*Math.min(Math.max(t,0),1);}
function easeInOut(t){return t<.5?2*t*t:(4-2*t)*t-1;}
function drawRoundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function renderStep0(p){
  const cx=W/2,topY=30;
  const paradigms=[
    {label:'选择题评测',sub:'MMLU / C-Eval',color:'#6C5CE7',icon:'ABCD'},
    {label:'生成式评测',sub:'GSM8K',color:'#0984E3',icon:'CoT'},
    {label:'执行式评测',sub:'HumanEval',color:'#00B894',icon:'Run'},
    {label:'人工评测',sub:'Arena',color:'#F59E0B',icon:'👤'},
  ];
  const bw=120,bh=80,gap=20;
  const total=paradigms.length*(bw+gap)-gap;
  const sx=cx-total/2;
  for(let i=0;i<paradigms.length;i++){
    const delay=i*.15;
    const ap=easeInOut(Math.max(0,Math.min(1,(p-delay)/.25)));
    const x=sx+i*(bw+gap),y=topY+40;
    ctx.globalAlpha=ap;
    ctx.fillStyle=paradigms[i].color+'22';ctx.strokeStyle=paradigms[i].color;ctx.lineWidth=2;
    drawRoundRect(x,y,bw,bh,12);ctx.fill();ctx.stroke();
    ctx.fillStyle=paradigms[i].color;ctx.font='bold 14px PingFang SC';ctx.textAlign='center';
    ctx.fillText(paradigms[i].label,x+bw/2,y+30);
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='12px PingFang SC';
    ctx.fillText(paradigms[i].sub,x+bw/2,y+50);
    ctx.font='bold 18px Courier New';ctx.fillStyle=paradigms[i].color;
    ctx.fillText(paradigms[i].icon,x+bw/2,y+bh-8);
    ctx.globalAlpha=1;
  }
  if(p>.7){
    const cp=easeInOut((p-.7)/.3);
    ctx.globalAlpha=cp;ctx.font='14px PingFang SC';ctx.fillStyle='var(--accent)';ctx.textAlign='center';
    ctx.fillText('完整评测 = 多范式组合 × 多维度覆盖',cx,topY+bh+80);
    const dims=['知识','对话','数学','代码','安全'];
    for(let i=0;i<dims.length;i++){
      const x=sx+i*(bw+gap)*.8+40,y2=topY+bh+110;
      ctx.fillStyle='rgba(108,92,231,.15)';ctx.strokeStyle='rgba(108,92,231,.4)';
      drawRoundRect(x,y2,70,30,6);ctx.fill();ctx.stroke();
      ctx.fillStyle='#6C5CE7';ctx.font='13px PingFang SC';
      ctx.fillText(dims[i],x+35,y2+20);
    }
    ctx.globalAlpha=1;
  }
}

function renderStep1(p){
  const cx=W/2,topY=20;
  ctx.font='bold 14px PingFang SC';ctx.textAlign='center';
  // Prompt
  const pp=easeInOut(Math.min(1,p/.25));
  ctx.globalAlpha=pp;
  ctx.fillStyle='rgba(108,92,231,.15)';ctx.strokeStyle='rgba(108,92,231,.5)';
  drawRoundRect(cx-140,topY,280,50,10);ctx.fill();ctx.stroke();
  ctx.fillStyle='#6C5CE7';ctx.font='13px PingFang SC';
  ctx.fillText('Prompt: Question + A/B/C/D + Answer:',cx,topY+30);
  ctx.globalAlpha=1;
  // Model
  const mp=easeInOut(Math.max(0,Math.min(1,(p-.2)/.2)));
  ctx.globalAlpha=mp;
  ctx.strokeStyle='rgba(249,158,11,.5)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx,topY+50);ctx.lineTo(cx,topY+80);ctx.stroke();
  ctx.fillStyle='rgba(249,158,11,.15)';ctx.strokeStyle='rgba(249,158,11,.5)';
  drawRoundRect(cx-80,topY+85,160,40,10);ctx.fill();ctx.stroke();
  ctx.fillStyle='#F59E0B';ctx.font='bold 13px PingFang SC';
  ctx.fillText('模型前向传播',cx,topY+110);
  ctx.globalAlpha=1;
  // Logits
  if(p>.4){
    const lp=easeInOut((p-.4)/.3);
    const choices=['A','B','C','D'];
    const logits=[2.3,0.8,5.1,1.2];
    const barW=50,barGap=15;
    const totalW=choices.length*(barW+barGap)-barGap;
    const bsx=cx-totalW/2,bsy=topY+160;
    ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx,topY+125);ctx.lineTo(cx,bsy);ctx.stroke();
    for(let i=0;i<4;i++){
      const x=bsx+i*(barW+barGap);
      const h=logits[i]/5.1*80*lp;
      const isMax=i===2;
      ctx.globalAlpha=lp;
      ctx.fillStyle=isMax?'rgba(0,184,148,.4)':'rgba(108,92,231,.2)';
      ctx.strokeStyle=isMax?'#00B894':'rgba(108,92,231,.4)';
      drawRoundRect(x,bsy+80-h,barW,h,4);ctx.fill();ctx.stroke();
      ctx.fillStyle=isMax?'#00B894':'#94A3B8';ctx.font='bold 16px Courier New';ctx.textAlign='center';
      ctx.fillText(choices[i],x+barW/2,bsy+100);
      ctx.font='12px Courier New';
      ctx.fillText(logits[i].toFixed(1),x+barW/2,bsy+75-h);
      ctx.globalAlpha=1;
    }
    if(p>.8){
      ctx.globalAlpha=easeInOut((p-.8)/.2);
      ctx.fillStyle='#00B894';ctx.font='bold 14px PingFang SC';
      ctx.fillText('→ 选择 C (logit 最高)',cx,bsy+125);
      ctx.globalAlpha=1;
    }
  }
}

function renderStep2(p){
  const cx=W/2,topY=15;
  const steps_data=[
    {text:'问题：小明有15个苹果...',color:'#6C5CE7'},
    {text:'CoT: 一步一步思考',color:'#F59E0B'},
    {text:'Step 1: 原来有 15 个',color:'#0984E3'},
    {text:'Step 2: 给了 3 个 → 12',color:'#0984E3'},
    {text:'Step 3: 买了 7 个 → 19',color:'#0984E3'},
    {text:'#### 19',color:'#00B894'},
    {text:'提取答案: 19 ✓',color:'#10B981'},
  ];
  let y=topY;
  for(let i=0;i<steps_data.length;i++){
    const delay=i*.12;
    const ap=easeInOut(Math.max(0,Math.min(1,(p-delay)/.2)));
    ctx.globalAlpha=ap;
    const s=steps_data[i];
    ctx.fillStyle=s.color+'15';ctx.strokeStyle=s.color+'88';ctx.lineWidth=1.5;
    drawRoundRect(cx-150,y,300,32,8);ctx.fill();ctx.stroke();
    ctx.fillStyle=s.color;ctx.font='13px PingFang SC';ctx.textAlign='center';
    ctx.fillText(s.text,cx,y+21);
    if(i>0){ctx.strokeStyle=s.color+'44';ctx.beginPath();ctx.moveTo(cx,y-4);ctx.lineTo(cx,y);ctx.stroke();}
    ctx.globalAlpha=1;
    y+=42;
  }
}

function renderStep3(p){
  const cx=W/2,topY=15;
  const flow=[
    {text:'函数签名 + docstring',color:'#6C5CE7'},
    {text:'模型生成函数体',color:'#F59E0B'},
    {text:'拼接: prompt + completion + test',color:'#0984E3'},
    {text:'子进程执行 (timeout=10s)',color:'#EF4444'},
    {text:'returncode == 0 ?',color:'#10B981'},
  ];
  let y=topY+10;
  for(let i=0;i<flow.length;i++){
    const delay=i*.15;
    const ap=easeInOut(Math.max(0,Math.min(1,(p-delay)/.2)));
    ctx.globalAlpha=ap;
    ctx.fillStyle=flow[i].color+'15';ctx.strokeStyle=flow[i].color;ctx.lineWidth=1.5;
    drawRoundRect(cx-130,y,260,35,8);ctx.fill();ctx.stroke();
    ctx.fillStyle=flow[i].color;ctx.font='13px PingFang SC';ctx.textAlign='center';
    ctx.fillText(flow[i].text,cx,y+23);
    if(i>0){ctx.strokeStyle=flow[i].color+'44';ctx.beginPath();ctx.moveTo(cx,y-6);ctx.lineTo(cx,y);ctx.stroke();}
    ctx.globalAlpha=1;
    y+=48;
  }
  if(p>.8){
    const bp=easeInOut((p-.8)/.2);
    ctx.globalAlpha=bp;
    ctx.fillStyle='#00B894';ctx.font='bold 13px PingFang SC';
    ctx.fillText('pass@1 = 一次就对  |  pass@5 = 五次至少对一次',cx,y+10);
    ctx.globalAlpha=1;
  }
}

function renderStep4(p){
  const cx=W/2,cy=H/2-10;
  const dims=['知识','对话','数学','代码','安全'];
  const N=dims.length;
  const R=Math.min(W,H)*0.32;
  const stages_data={
    base:[.35,.20,.10,.08,.30],
    sft:[.45,.65,.25,.18,.55],
    rl:[.48,.75,.35,.22,.82],
  };
  const colors={base:'#94A3B8',sft:'#0984E3',rl:'#00B894'};
  const labels_zh={base:'基座',sft:'SFT',rl:'RL'};
  const angles=[];
  for(let i=0;i<N;i++) angles.push(-Math.PI/2+2*Math.PI*i/N);
  // Grid
  ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1;
  for(let r=0.2;r<=1.0;r+=0.2){
    ctx.beginPath();
    for(let i=0;i<=N;i++){
      const a=angles[i%N];
      const x=cx+Math.cos(a)*R*r,y=cy+Math.sin(a)*R*r;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  // Labels
  ctx.fillStyle='#E2E8F0';ctx.font='bold 13px PingFang SC';ctx.textAlign='center';
  for(let i=0;i<N;i++){
    const a=angles[i];
    const x=cx+Math.cos(a)*(R+25),y=cy+Math.sin(a)*(R+25);
    ctx.fillText(dims[i],x,y+5);
  }
  // Plot stages
  let si=0;
  for(const[stage,vals] of Object.entries(stages_data)){
    const delay=si*.25;
    const sp=easeInOut(Math.max(0,Math.min(1,(p-delay)/.3)));
    ctx.strokeStyle=colors[stage];ctx.lineWidth=2.5;ctx.fillStyle=colors[stage]+'22';
    ctx.beginPath();
    for(let i=0;i<=N;i++){
      const a=angles[i%N];
      const v=vals[i%N]*sp;
      const x=cx+Math.cos(a)*R*v,y=cy+Math.sin(a)*R*v;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.globalAlpha=sp;ctx.fill();ctx.stroke();
    // Label
    ctx.fillStyle=colors[stage];ctx.font='bold 12px PingFang SC';
    ctx.fillText(labels_zh[stage],cx+R+40,cy-30+si*20);
    ctx.globalAlpha=1;
    si++;
  }
}

function renderStep5(p){
  const cx=W/2,topY=30;
  ctx.font='bold 14px PingFang SC';ctx.textAlign='center';
  // Leakage illustration
  const lp=easeInOut(Math.min(1,p/.3));
  ctx.globalAlpha=lp;
  ctx.fillStyle='rgba(239,68,68,.15)';ctx.strokeStyle='#EF4444';ctx.lineWidth=2;
  drawRoundRect(cx-160,topY,140,60,10);ctx.fill();ctx.stroke();
  ctx.fillStyle='#EF4444';ctx.font='13px PingFang SC';
  ctx.fillText('训练数据',cx-90,topY+25);
  ctx.font='11px PingFang SC';ctx.fillStyle='rgba(239,68,68,.7)';
  ctx.fillText('含 Benchmark 题目',cx-90,topY+45);

  ctx.fillStyle='rgba(0,184,148,.15)';ctx.strokeStyle='#00B894';
  drawRoundRect(cx+20,topY,140,60,10);ctx.fill();ctx.stroke();
  ctx.fillStyle='#00B894';ctx.font='13px PingFang SC';
  ctx.fillText('评测集',cx+90,topY+25);
  ctx.font='11px PingFang SC';ctx.fillStyle='rgba(0,184,148,.7)';
  ctx.fillText('MMLU / GSM8K',cx+90,topY+45);
  ctx.globalAlpha=1;

  // Overlap arrow
  if(p>.3){
    const op=easeInOut((p-.3)/.2);
    ctx.globalAlpha=op;ctx.strokeStyle='#F59E0B';ctx.lineWidth=3;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(cx-20,topY+30);ctx.lineTo(cx+20,topY+30);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#F59E0B';ctx.font='bold 12px PingFang SC';
    ctx.fillText('泄露!',cx,topY+18);
    ctx.globalAlpha=1;
  }

  // Solutions
  if(p>.5){
    const sp=easeInOut((p-.5)/.5);
    const fixes=[
      {text:'N-gram 重叠检测',color:'#6C5CE7'},
      {text:'Canary String 检测',color:'#0984E3'},
      {text:'多 Benchmark 交叉验证',color:'#00B894'},
      {text:'定期更新评测集',color:'#F59E0B'},
    ];
    let y=topY+90;
    for(let i=0;i<fixes.length;i++){
      const delay=.5+i*.1;
      const fp=easeInOut(Math.max(0,Math.min(1,(p-delay)/.2)));
      ctx.globalAlpha=fp;
      ctx.fillStyle=fixes[i].color+'15';ctx.strokeStyle=fixes[i].color+'88';
      drawRoundRect(cx-110,y,220,28,6);ctx.fill();ctx.stroke();
      ctx.fillStyle=fixes[i].color;ctx.font='12px PingFang SC';
      ctx.fillText(fixes[i].text,cx,y+18);
      ctx.globalAlpha=1;
      y+=36;
    }
  }
}

const renderers=[renderStep0,renderStep1,renderStep2,renderStep3,renderStep4,renderStep5];

function render(){ctx.clearRect(0,0,W,H);if(renderers[currentStep])renderers[currentStep](animProgress);}
function startAnim(){animProgress=0;const start=performance.now(),duration=2000;function tick(now){animProgress=Math.min(1,(now-start)/duration);render();if(animProgress<1)animId=requestAnimationFrame(tick);}if(animId)cancelAnimationFrame(animId);animId=requestAnimationFrame(tick);}

function updateUI(){
  const s=steps[currentStep];
  document.getElementById('stepTitle').textContent=s.title;
  document.getElementById('stepDesc').innerHTML=s.desc;
  const fb=document.getElementById('formulaBox');
  if(s.formula){fb.style.display='block';fb.textContent=s.formula;}else fb.style.display='none';
  document.getElementById('counter').textContent=`Step ${currentStep+1}/${steps.length}`;
  const dotsEl=document.getElementById('dots');dotsEl.innerHTML='';
  for(let i=0;i<steps.length;i++){const d=document.createElement('span');if(i===currentStep)d.className='active';d.onclick=()=>{currentStep=i;updateUI();startAnim();};dotsEl.appendChild(d);}
}

function nextStep(){if(currentStep<steps.length-1){currentStep++;updateUI();startAnim();}}
function prevStep(){if(currentStep>0){currentStep--;updateUI();startAnim();}}
function replay(){startAnim();}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nextStep();else if(e.key==='ArrowLeft')prevStep();});
resize();updateUI();startAnim();
</script>
</body>
</html>
