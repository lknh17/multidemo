<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V19 - 层级标签代码可视化</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0d1117;color:#e0e0e0;font-family:'Segoe UI',sans-serif;overflow:hidden}canvas{display:block}
#controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10;flex-wrap:wrap;justify-content:center}
#controls button{padding:10px 20px;border:1px solid #4caf50;border-radius:25px;background:rgba(76,175,80,0.1);color:#81c784;cursor:pointer;font-size:13px;transition:all 0.3s}
#controls button:hover{background:rgba(76,175,80,0.3)}#controls button.active{background:linear-gradient(135deg,#4caf50,#81c784);color:#0d1117}
#info{position:fixed;top:20px;left:50%;transform:translateX(-50%);text-align:center;z-index:10}
#title{font-size:20px;background:linear-gradient(135deg,#4caf50,#81c784);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px}
#desc{font-size:13px;color:#8b949e;max-width:700px}
</style>
</head>
<body>
<div id="info"><div id="title">V19 - 层级标签代码可视化</div><div id="desc"></div></div>
<canvas id="canvas"></canvas>
<div id="controls">
<button onclick="setStep(0)" class="active">TaxonomyTree</button>
<button onclick="setStep(1)">HierSoftmax</button>
<button onclick="setStep(2)">GNN传播</button>
<button onclick="setStep(3)">双曲嵌入</button>
<button onclick="setStep(4)">级联分类</button>
</div>
<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
let W,H,step=0,time=0;
const descs=[
'TaxonomyTree: parent/children字典维护层级关系，get_path返回根到叶路径',
'HierarchicalSoftmax: 逐层classifiers[lv](features)做条件分类，权重λ_k=(k+1)/Σ',
'LabelPropagationGNN: adj_norm邻接矩阵 × node_features → 线性变换 → ReLU',
'HyperbolicEmbedding: exp_map_zero映射到Poincaré球，project_to_ball确保范数<1',
'HierarchicalClassifier: encoder→coarse_head→embed→fusion→mid_head→fine_head'
];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
window.addEventListener('resize',resize);resize();
function setStep(s){step=s;time=0;document.querySelectorAll('#controls button').forEach((b,i)=>b.classList.toggle('active',i===s));document.getElementById('desc').textContent=descs[s]}
setStep(0);

function drawCode(lines,x,y,hl){
ctx.font='11px "Courier New",monospace';ctx.textAlign='start';
lines.forEach((l,i)=>{
const h=hl&&hl.includes(i);
if(h){ctx.fillStyle='#4caf5022';ctx.fillRect(x-5,y+i*16-11,480,16);ctx.fillStyle='#81c784'}
else ctx.fillStyle='#8b949e';
ctx.fillText(l,x,y+i*16);
});
}

function drawTreeCode(){
const cx=W/2;
const code=[
'class TaxonomyTree:',
'    def __init__(self, num_labels_per_level):',
'        self.parent = {}   # child→parent',
'        self.children = {} # parent→[children]',
'        self.level_of = {} # label→level',
'',
'    def get_ancestors(self, node_id):',
'        ancestors = []',
'        current = node_id',
'        while current in self.parent:',
'            current = self.parent[current]',
'            ancestors.append(current)',
'        return ancestors',
'',
'    def get_path(self, node_id):',
'        return reversed(ancestors) + [node_id]',
];
drawCode(code,cx-230,H/2-120,[2,3,4,10,11]);
// 右侧可视化树
const rx=cx+150,ry=H/2-60;
const treeNodes=[{x:rx,y:ry,l:'root'},{x:rx-60,y:ry+50,l:'A'},{x:rx+60,y:ry+50,l:'B'},{x:rx-80,y:ry+100,l:'a1'},{x:rx-40,y:ry+100,l:'a2'},{x:rx+40,y:ry+100,l:'b1'},{x:rx+80,y:ry+100,l:'b2'}];
const treeEdges=[[0,1],[0,2],[1,3],[1,4],[2,5],[2,6]];
treeEdges.forEach(([a,b])=>{
ctx.beginPath();ctx.moveTo(treeNodes[a].x,treeNodes[a].y);ctx.lineTo(treeNodes[b].x,treeNodes[b].y);
ctx.strokeStyle='#4caf5044';ctx.lineWidth=1.5;ctx.stroke();
});
// 高亮路径
const pathIdx=Math.floor(time*0.01)%4;
const paths=[[0,1,3],[0,1,4],[0,2,5],[0,2,6]];
const path=paths[pathIdx];
for(let i=0;i<path.length-1;i++){
ctx.beginPath();ctx.moveTo(treeNodes[path[i]].x,treeNodes[path[i]].y);
ctx.lineTo(treeNodes[path[i+1]].x,treeNodes[path[i+1]].y);
ctx.strokeStyle='#81c784';ctx.lineWidth=3;ctx.stroke();
}
treeNodes.forEach((n,i)=>{
const onPath=path.includes(i);
ctx.beginPath();ctx.arc(n.x,n.y,12,0,Math.PI*2);
ctx.fillStyle=onPath?'#4caf50':'#333';ctx.fill();
ctx.fillStyle=onPath?'#fff':'#888';ctx.font='10px sans-serif';ctx.textAlign='center';
ctx.fillText(n.l,n.x,n.y+3);
});
ctx.fillStyle='#81c784';ctx.font='11px sans-serif';
ctx.fillText(`path: [${path.map(i=>treeNodes[i].l).join('→')}]`,rx,ry+135);
ctx.textAlign='start';
}

function drawHierSoftmaxCode(){
const cx=W/2;
const code=[
'class HierarchicalSoftmax(nn.Module):',
'    def __init__(self, tree, d_model):',
'        self.classifiers = ModuleList([',
'            Linear(d_model, n_classes_lv)',
'            for lv in range(num_levels)',
'        ])',
'        # λ_k = (k+1)/Σ(k+1)',
'        self.weights = [1/6, 2/6, 3/6]',
'',
'    def forward(self, features, targets):',
'        loss = 0',
'        for lv in range(num_levels):',
'            logits = classifiers[lv](feat)',
'            loss += λ[lv] * CE(logits, tgt)',
'        return loss',
];
drawCode(code,cx-250,H/2-110,[2,3,7,12,13]);
// 右侧权重可视化
const rx=cx+130,ry=H/2-40;
const weights=[0.167,0.333,0.5];
const colors=['#ff6b6b','#ffd93d','#4caf50'];
weights.forEach((w,i)=>{
const barW=w*200;
ctx.fillStyle=colors[i];
ctx.fillRect(rx,ry+i*30,barW,20);
ctx.fillStyle='#fff';ctx.font='11px sans-serif';ctx.textAlign='start';
ctx.fillText(`L${i}: λ=${w.toFixed(3)}`,rx+barW+10,ry+i*30+14);
});
ctx.fillStyle='#aaa';ctx.font='11px sans-serif';
ctx.fillText('细粒度层权重更大',rx,ry+100);
}

function drawGNNCode(){
const cx=W/2;
const code=[
'class LabelPropagationGNN(nn.Module):',
'    def __init__(self, tree, d_model):',
'        # Â = D^{-1/2} A D^{-1/2}',
'        adj = build_adj(tree)  # 含自环',
'        self.adj_norm = normalize(adj)',
'        self.layers = [Linear(d,d)]',
'',
'    def forward(self, node_features):',
'        h = node_features  # [N, D]',
'        for layer in self.layers:',
'            h_agg = adj_norm @ h  # 聚合',
'            h = ReLU(layer(h_agg))',
'        return h',
];
drawCode(code,cx-250,H/2-100,[2,3,4,10,11]);
// 右侧矩阵乘法动画
const rx=cx+120,ry=H/2-30;
const sz=5;
ctx.fillStyle='#81c784';ctx.font='12px sans-serif';ctx.textAlign='center';
ctx.fillText('Â',rx+20,ry-15);ctx.fillText('×',rx+65,ry+25);ctx.fillText('H',rx+100,ry-15);ctx.fillText('=',rx+145,ry+25);ctx.fillText('H\'',rx+180,ry-15);
for(let i=0;i<sz;i++)for(let j=0;j<sz;j++){
const v=i===j?0.6:(Math.abs(i-j)===1?0.2:0);
ctx.fillStyle=`rgba(76,175,80,${v})`;
ctx.fillRect(rx+j*12,ry+i*12,10,10);
}
const col=Math.floor(time*0.03)%sz;
for(let i=0;i<sz;i++){
ctx.fillStyle=`hsl(${120+i*30},70%,50%)`;
ctx.fillRect(rx+80,ry+i*12,10,10);
ctx.fillRect(rx+160,ry+i*12,10,10);
}
ctx.textAlign='start';
}

function drawHyperbolicCode(){
const cx=W/2;
const code=[
'def poincare_distance(u, v, eps=1e-5):',
'    diff_sq = sum((u-v)**2)',
'    u_sq = sum(u**2).clamp(max=1-eps)',
'    v_sq = sum(v**2).clamp(max=1-eps)',
'    arg = 1 + 2*diff_sq / ((1-u_sq)*(1-v_sq))',
'    return arcosh(arg)',
'',
'def exp_map_zero(v, c=1.0):',
'    norm = v.norm().clamp(min=eps)',
'    return tanh(√c·norm) * v/(√c·norm)',
'',
'def project_to_ball(x, c=1.0):',
'    max_norm = (1-eps)/√c',
'    return x * min(1, max_norm/||x||)',
];
drawCode(code,cx-250,H/2-110,[4,5,9,13]);
// 右侧 Poincaré 球
const bx=cx+150,by=H/2-10,br=80;
ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);
ctx.strokeStyle='#4caf5066';ctx.lineWidth=2;ctx.stroke();
// 点映射动画
const t=time*0.02;
const euclX=Math.cos(t)*40;
const euclY=Math.sin(t)*30;
const norm=Math.sqrt(euclX*euclX+euclY*euclY);
const hyp_scale=Math.tanh(norm/50);
const hypX=euclX/norm*hyp_scale*br*0.9;
const hypY=euclY/norm*hyp_scale*br*0.9;
ctx.beginPath();ctx.arc(bx+hypX,by+hypY,5,0,Math.PI*2);
ctx.fillStyle='#81c784';ctx.fill();
ctx.beginPath();ctx.arc(bx,by,4,0,Math.PI*2);
ctx.fillStyle='#ff6b6b';ctx.fill();
ctx.fillStyle='#aaa';ctx.font='10px sans-serif';ctx.textAlign='center';
ctx.fillText('原点(根)',bx,by+br+15);
ctx.fillText('边界(叶)',bx+br-10,by-br+15);
ctx.textAlign='start';
}

function drawCascadeCode(){
const cx=W/2;
const code=[
'class HierarchicalClassifier:',
'    def predict_with_cascade(self, images):',
'        feat = encoder(images)      # [B,D]',
'        # Level 0: 粗粒度',
'        coarse = coarse_head(feat)  # [B,10]',
'        pred_c = coarse.argmax(-1)',
'        # Level 1: 条件在粗粒度上',
'        cond = coarse_embed(pred_c) # [B,D]',
'        mid_feat = fusion(cat(feat,cond))',
'        mid = mid_head(mid_feat)    # [B,50]',
'        # Level 2: 条件在中粒度上',
'        fine = fine_head(...)       # [B,200]',
];
drawCode(code,cx-250,H/2-100,[4,5,8,9,12]);
// 右侧流程图
const rx=cx+120,ry=H/2-80;
const blocks=[
{y:ry,label:'Encoder',color:'#58a6ff',w:100},
{y:ry+50,label:'Coarse (10类)',color:'#ff6b6b',w:100},
{y:ry+100,label:'+ Embed → Fusion',color:'#ffd93d',w:120},
{y:ry+150,label:'Fine (200类)',color:'#4caf50',w:100},
];
blocks.forEach((b,i)=>{
ctx.fillStyle=b.color+'33';ctx.fillRect(rx-b.w/2,b.y,b.w,35);
ctx.strokeStyle=b.color;ctx.strokeRect(rx-b.w/2,b.y,b.w,35);
ctx.fillStyle=b.color;ctx.font='11px sans-serif';ctx.textAlign='center';
ctx.fillText(b.label,rx,b.y+21);
if(i<blocks.length-1){
ctx.beginPath();ctx.moveTo(rx,b.y+35);ctx.lineTo(rx,blocks[i+1].y);
ctx.strokeStyle='#555';ctx.lineWidth=1.5;ctx.stroke();
}
});
// 动画箭头
const aIdx=Math.floor(time*0.015)%blocks.length;
ctx.fillStyle=blocks[aIdx].color;
ctx.beginPath();ctx.arc(rx-blocks[aIdx].w/2-10,blocks[aIdx].y+17,5,0,Math.PI*2);ctx.fill();
ctx.textAlign='start';
}

const drawFns=[drawTreeCode,drawHierSoftmaxCode,drawGNNCode,drawHyperbolicCode,drawCascadeCode];
function animate(){ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);time++;drawFns[step]();requestAnimationFrame(animate)}
animate();
</script>
</body>
</html>
