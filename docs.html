<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档站 — 多模态大模型学习工程</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/languages/json.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a1f35;
            --bg-card-hover: #222845;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #2a3050;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --sidebar-width: 280px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            position: fixed;
            top: 0; left: 0; bottom: 0;
            overflow-y: auto;
            z-index: 100;
            transition: transform .3s;
        }
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h2 {
            font-size: 1rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .sidebar-header a {
            display: inline-block;
            margin-top: 8px;
            font-size: .8rem;
            color: var(--accent-blue);
            text-decoration: none;
        }
        .sidebar-header a:hover { text-decoration: underline; }
        .sidebar-search {
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-search input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: .85rem;
            outline: none;
        }
        .sidebar-search input:focus { border-color: var(--accent-blue); }
        .nav-group { padding: 8px 0; }
        .nav-group-title {
            padding: 8px 16px;
            font-size: .75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-group-title::before {
            content: '▸';
            font-size: .65rem;
            transition: transform .2s;
        }
        .nav-group.open .nav-group-title::before { transform: rotate(90deg); }
        .nav-items { display: none; }
        .nav-group.open .nav-items { display: block; }
        .nav-item {
            display: block;
            padding: 6px 16px 6px 32px;
            font-size: .82rem;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            border-left: 2px solid transparent;
            transition: all .15s;
        }
        .nav-item:hover { color: var(--text-primary); background: rgba(59,130,246,.05); }
        .nav-item.active { color: var(--accent-blue); border-left-color: var(--accent-blue); background: rgba(59,130,246,.08); }

        /* Content */
        .content {
            margin-left: var(--sidebar-width);
            flex: 1;
            max-width: 900px;
            padding: 40px 48px 80px;
        }
        .reading-progress {
            position: fixed; top: 0; left: var(--sidebar-width); right: 0;
            height: 3px; z-index: 50; background: transparent;
        }
        .reading-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            width: 0;
            transition: width .1s;
        }

        /* TOC */
        .toc {
            position: fixed;
            right: 24px;
            top: 80px;
            width: 200px;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            font-size: .78rem;
            border-left: 1px solid var(--border);
            padding-left: 12px;
        }
        .toc-title { font-weight: 700; color: var(--text-muted); margin-bottom: 8px; font-size: .72rem; text-transform: uppercase; letter-spacing: .5px; }
        .toc a {
            display: block;
            padding: 3px 0;
            color: var(--text-muted);
            text-decoration: none;
            transition: color .15s;
        }
        .toc a:hover, .toc a.active { color: var(--accent-blue); }
        .toc a.h3 { padding-left: 12px; }

        /* Markdown rendered content */
        .md-content h1 { font-size: 2rem; font-weight: 800; margin: 0 0 16px; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .md-content h2 { font-size: 1.5rem; font-weight: 700; margin: 40px 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); color: var(--text-primary); position: relative; }
        .md-content h2 .anchor { display: none; position: absolute; left: -20px; color: var(--accent-blue); text-decoration: none; font-size: .9em; }
        .md-content h2:hover .anchor { display: inline; }
        .md-content h3 { font-size: 1.2rem; font-weight: 600; margin: 28px 0 12px; color: var(--text-primary); }
        .md-content h4 { font-size: 1rem; font-weight: 600; margin: 20px 0 8px; color: var(--text-secondary); }
        .md-content p { margin: 0 0 16px; color: var(--text-secondary); }
        .md-content a { color: var(--accent-blue); text-decoration: none; }
        .md-content a:hover { text-decoration: underline; }
        .md-content ul, .md-content ol { margin: 0 0 16px; padding-left: 24px; color: var(--text-secondary); }
        .md-content li { margin-bottom: 6px; }
        .md-content strong { color: var(--text-primary); }
        .md-content em { color: #a78bfa; }
        .md-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

        /* Code blocks */
        .md-content pre {
            position: relative;
            margin: 0 0 20px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .md-content pre code {
            display: block;
            padding: 16px 20px;
            font-size: .85rem;
            line-height: 1.6;
            overflow-x: auto;
            background: #0d1117 !important;
        }
        .md-content code {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: .88em;
            background: rgba(59,130,246,.1);
            padding: 2px 6px;
            border-radius: 4px;
            color: #93c5fd;
        }
        .md-content pre code { background: transparent !important; padding: 0; color: inherit; }
        .copy-btn {
            position: absolute;
            top: 8px; right: 8px;
            padding: 4px 10px;
            font-size: .72rem;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 4px;
            color: var(--text-muted);
            cursor: pointer;
            opacity: 0;
            transition: opacity .2s;
        }
        .md-content pre:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: rgba(255,255,255,.15); }

        /* Tables */
        .md-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 0 0 20px;
            font-size: .88rem;
        }
        .md-content th {
            background: var(--bg-card);
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid var(--border);
            color: var(--text-primary);
        }
        .md-content td {
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .md-content tr:nth-child(even) td { background: rgba(255,255,255,.02); }
        .md-content tr:hover td { background: rgba(59,130,246,.05); }

        /* Blockquotes / callouts */
        .md-content blockquote {
            margin: 0 0 20px;
            padding: 14px 20px;
            border-radius: 8px;
            border-left: 4px solid;
            font-size: .9rem;
        }
        .md-content blockquote.tip { border-color: #10b981; background: rgba(16,185,129,.06); }
        .md-content blockquote.warning { border-color: #f59e0b; background: rgba(245,158,11,.06); }
        .md-content blockquote.danger { border-color: #ef4444; background: rgba(239,68,68,.06); }
        .md-content blockquote.info { border-color: #3b82f6; background: rgba(59,130,246,.06); }
        .md-content blockquote:not(.tip):not(.warning):not(.danger):not(.info) { border-color: var(--border); background: var(--bg-card); }

        /* KaTeX */
        .md-content .katex-display { margin: 20px 0; overflow-x: auto; }

        /* Images */
        .md-content img { max-width: 100%; border-radius: 8px; margin: 12px auto; display: block; }

        /* Loading */
        .loading { text-align: center; padding: 80px; color: var(--text-muted); }
        .loading::after { content: ''; display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin .6s linear infinite; margin-left: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Mobile */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 12px; left: 12px;
            z-index: 200;
            width: 40px; height: 40px;
            border-radius: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }
        @media (max-width: 1200px) { .toc { display: none; } }
        @media (max-width: 768px) {
            .menu-toggle { display: flex; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .content { margin-left: 0; padding: 60px 20px 80px; }
            .reading-progress { left: 0; }
        }
    </style>
</head>
<body>

<button class="menu-toggle" id="menuToggle">☰</button>

<div class="reading-progress"><div class="reading-progress-bar" id="progressBar"></div></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h2>📚 多模态大模型文档</h2>
        <a href="./index.html">← 返回导览首页</a>
    </div>
    <div class="sidebar-search">
        <input type="text" placeholder="搜索文档..." id="docSearch">
    </div>
    <nav id="sidebarNav"></nav>
</aside>

<main class="content">
    <div id="mdContent" class="md-content">
        <div class="loading">加载文档中</div>
    </div>
</main>

<aside class="toc" id="toc"></aside>

<script>
const MODULES = [
    { id: 'p01_env_setup', title: 'P01 环境搭建与显存估算', emoji: '🔥' },
    { id: 'p02_continual_pretrain', title: 'P02 继续预训练', emoji: '🔥' },
    { id: 'p03_sft_finetuning', title: 'P03 SFT 指令微调', emoji: '🔥' },
    { id: 'p04_dpo_alignment', title: 'P04 DPO 偏好对齐', emoji: '🔥' },
    { id: 'p05_rl_grpo', title: 'P05 RL 强化学习 GRPO', emoji: '🔥' },
    { id: 'p06_mllm_vision', title: 'P06 MLLM 多模态微调', emoji: '🔥' },
    { id: 'p07_quantization', title: 'P07 模型量化', emoji: '🔥' },
    { id: 'p08_serving_deploy', title: 'P08 推理部署', emoji: '🔥' },
    { id: 'p09_evaluation', title: 'P09 评测体系', emoji: '🔥' },
    { id: 'p10_best_practices', title: 'P10 全流程总结', emoji: '🔥' },
];

const DOCS = [
    { key: 'readme', file: 'README.md', label: '📖 手把手教程' },
    { key: 'theory', file: 'theory.md', label: '🔬 原理详解' },
    { key: 'code_explained', file: 'code_explained.md', label: '💻 代码详解' },
];

// Build sidebar
function buildSidebar() {
    const nav = document.getElementById('sidebarNav');
    let html = '';
    MODULES.forEach(m => {
        html += `<div class="nav-group open" data-module="${m.id}">`;
        html += `<div class="nav-group-title">${m.emoji} ${m.title}</div>`;
        html += `<div class="nav-items">`;
        DOCS.forEach(d => {
            html += `<div class="nav-item" data-path="${m.id}/${d.key}" onclick="loadDoc('${m.id}','${d.file}',this)">${d.label}</div>`;
        });
        html += `</div></div>`;
    });
    nav.innerHTML = html;

    // Toggle groups
    nav.querySelectorAll('.nav-group-title').forEach(t => {
        t.addEventListener('click', () => t.parentElement.classList.toggle('open'));
    });
}

// Markdown rendering with KaTeX
function renderMath(text) {
    // Block math $$...$$
    text = text.replace(/\$\$([\s\S]*?)\$\$/g, (_, tex) => {
        try { return '<div class="katex-display">' + katex.renderToString(tex.trim(), { displayMode: true, throwOnError: false }) + '</div>'; }
        catch { return `<div class="katex-display">${tex}</div>`; }
    });
    // Inline math $...$
    text = text.replace(/\$([^\$\n]+?)\$/g, (_, tex) => {
        try { return katex.renderToString(tex.trim(), { displayMode: false, throwOnError: false }); }
        catch { return `<code>${tex}</code>`; }
    });
    return text;
}

function styleCallouts(html) {
    return html.replace(/<blockquote>([\s\S]*?)<\/blockquote>/g, (match, inner) => {
        if (inner.includes('💡') || inner.includes('提示')) return `<blockquote class="tip">${inner}</blockquote>`;
        if (inner.includes('⚠️') || inner.includes('注意')) return `<blockquote class="warning">${inner}</blockquote>`;
        if (inner.includes('❌') || inner.includes('错误')) return `<blockquote class="danger">${inner}</blockquote>`;
        if (inner.includes('📝') || inner.includes('说明')) return `<blockquote class="info">${inner}</blockquote>`;
        return match;
    });
}

function addCopyButtons(html) {
    return html.replace(/<pre><code/g, '<pre><button class="copy-btn" onclick="copyCode(this)">复制</button><code');
}

function addAnchors(html) {
    return html.replace(/<h2(.*?)>(.*?)<\/h2>/g, (match, attrs, text) => {
        const id = text.replace(/<[^>]*>/g, '').trim().replace(/\s+/g, '-').toLowerCase();
        return `<h2${attrs} id="${id}"><a class="anchor" href="#${id}">#</a>${text}</h2>`;
    });
}

function renderMarkdown(md) {
    const mathProcessed = renderMath(md);
    marked.setOptions({
        highlight: (code, lang) => {
            if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
            return hljs.highlightAuto(code).value;
        },
        gfm: true,
        breaks: false,
    });
    let html = marked.parse(mathProcessed);
    html = styleCallouts(html);
    html = addCopyButtons(html);
    html = addAnchors(html);
    return html;
}

// TOC
function buildTOC(container) {
    const toc = document.getElementById('toc');
    const headings = container.querySelectorAll('h2, h3');
    if (headings.length === 0) { toc.innerHTML = ''; return; }
    let html = '<div class="toc-title">目录</div>';
    headings.forEach(h => {
        const id = h.id || h.textContent.trim().replace(/\s+/g, '-').toLowerCase();
        if (!h.id) h.id = id;
        const cls = h.tagName === 'H3' ? ' class="h3"' : '';
        html += `<a${cls} href="#${id}">${h.textContent.replace('#', '').trim()}</a>`;
    });
    toc.innerHTML = html;
}

// Load document
async function loadDoc(moduleId, file, navEl) {
    const container = document.getElementById('mdContent');
    container.innerHTML = '<div class="loading">加载文档中</div>';

    // Active nav
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if (navEl) navEl.classList.add('active');

    const url = `./${moduleId}/${file}`;
    try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`${resp.status}`);
        const md = await resp.text();
        container.innerHTML = renderMarkdown(md);
        buildTOC(container);
        window.scrollTo(0, 0);

        // Update hash
        const key = file.replace('.md', '').replace('README', 'readme');
        history.replaceState(null, '', `#${moduleId}/${key}`);
    } catch (e) {
        container.innerHTML = `<div style="text-align:center;padding:80px;color:var(--text-muted)">
            <p style="font-size:1.2rem;margin-bottom:12px">文档加载失败</p>
            <p>路径：${url}</p>
            <p style="margin-top:8px;font-size:.85rem">请确认文件存在。错误：${e.message}</p>
        </div>`;
    }
}

// Copy code
window.copyCode = function(btn) {
    const code = btn.nextElementSibling.textContent;
    navigator.clipboard.writeText(code).then(() => {
        btn.textContent = '已复制';
        setTimeout(() => btn.textContent = '复制', 1500);
    });
};

// Reading progress
window.addEventListener('scroll', () => {
    const h = document.documentElement.scrollHeight - window.innerHeight;
    document.getElementById('progressBar').style.width = h > 0 ? (window.scrollY / h * 100) + '%' : '0%';
});

// Mobile menu
document.getElementById('menuToggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
});

// Search
document.getElementById('docSearch').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase().trim();
    document.querySelectorAll('.nav-group').forEach(g => {
        const title = g.querySelector('.nav-group-title').textContent.toLowerCase();
        g.style.display = !q || title.includes(q) ? '' : 'none';
    });
});

// Init
buildSidebar();

// Load from hash or default
const hash = window.location.hash.slice(1);
if (hash) {
    const [mod, key] = hash.split('/');
    const doc = DOCS.find(d => d.key === key || d.file.replace('.md','') === key);
    if (mod && doc) {
        const navItem = document.querySelector(`.nav-item[data-path="${mod}/${doc.key}"]`);
        loadDoc(mod, doc.file, navItem);
    } else {
        loadDoc('p01_env_setup', 'README.md', document.querySelector('.nav-item'));
    }
} else {
    loadDoc('p01_env_setup', 'README.md', document.querySelector('.nav-item'));
}
</script>
</body>
</html>
