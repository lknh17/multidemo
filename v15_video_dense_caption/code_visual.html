<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V15 - 视频 Dense Captioning 代码可视化</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
canvas { display: block; }
#controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; }
#controls button { padding: 10px 20px; border: 1px solid #58a6ff; border-radius: 25px; background: rgba(88,166,255,0.1); color: #58a6ff; cursor: pointer; font-size: 13px; transition: all 0.3s; }
#controls button:hover { background: rgba(88,166,255,0.3); }
#controls button.active { background: #58a6ff; color: #0d1117; }
#info { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 10; }
#title { font-size: 20px; color: #58a6ff; margin-bottom: 5px; }
#desc { font-size: 13px; color: #8b949e; max-width: 700px; }
</style>
</head>
<body>
<div id="info">
<div id="title">V15 - 代码实现可视化</div>
<div id="desc">TimeSformer reshape 与 Dense Caption Pipeline</div>
</div>
<canvas id="canvas"></canvas>
<div id="controls">
<button onclick="setStep(0)" class="active">Reshape流</button>
<button onclick="setStep(1)">Event Query</button>
<button onclick="setStep(2)">RoI Pool</button>
<button onclick="setStep(3)">NMS代码</button>
<button onclick="setStep(4)">Caption解码</button>
<button onclick="setStep(5)">关键帧采样</button>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, step = 0, time = 0;
const descs = [
'TimeSformer reshape 操作：(B·T,N,D)→(B·N,T,D) 改变"谁和谁做注意力"',
'Event Query 通过 Cross-Attention 与视频特征交互 → 回归 (center, width)',
'Temporal RoI Pool：双线性插值提取提议区间特征',
'时序 NMS 代码流程：排序 → IoU 计算 → 衰减/删除 → 迭代',
'Caption Decoder：自回归生成 + Cross-Attention with proposal features',
'关键帧采样：均匀 vs 运动差异 vs 聚类，选代表性帧'
];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();
function setStep(s) {
step = s; time = 0;
document.querySelectorAll('#controls button').forEach((b,i)=>b.classList.toggle('active',i===s));
document.getElementById('desc').textContent = descs[s];
}

function drawCode(lines, x, y, highlight) {
ctx.font = '12px "Courier New", monospace';
lines.forEach((line, i) => {
const isHL = highlight && highlight.includes(i);
ctx.fillStyle = isHL ? '#ffd93d' : '#8b949e';
if (isHL) {
ctx.fillStyle = '#ffd93d22';
ctx.fillRect(x - 5, y + i * 18 - 12, 500, 18);
ctx.fillStyle = '#ffd93d';
}
ctx.fillText(line, x, y + i * 18);
});
}

function drawReshapeFlow() {
const cx = W/2, cy = H/2 - 30;
const phase = Math.floor(time * 0.015) % 3;
// Tensor shapes
const shapes = [
{label: '输入', shape: '(B·T, N, D)', desc: '每帧的 N 个 patch', x: cx-200, y: cy-50},
{label: '时序 reshape', shape: '(B·N, T, D)', desc: '每个位置的 T 帧', x: cx, y: cy-50},
{label: '空间 reshape', shape: '(B·T, N, D)', desc: '回到每帧形式', x: cx+200, y: cy-50},
];
shapes.forEach((s, i) => {
const active = i <= phase;
ctx.fillStyle = active ? '#1a3a5c' : '#1a1a2e';
ctx.strokeStyle = active ? '#58a6ff' : '#333';
ctx.lineWidth = active ? 2 : 1;
const bw = 140, bh = 60;
ctx.fillRect(s.x - bw/2, s.y - bh/2, bw, bh);
ctx.strokeRect(s.x - bw/2, s.y - bh/2, bw, bh);
ctx.fillStyle = active ? '#58a6ff' : '#555';
ctx.font = 'bold 12px sans-serif';
ctx.textAlign = 'center';
ctx.fillText(s.label, s.x, s.y - 12);
ctx.fillStyle = active ? '#fff' : '#666';
ctx.font = '13px monospace';
ctx.fillText(s.shape, s.x, s.y + 5);
ctx.fillStyle = '#8b949e';
ctx.font = '10px sans-serif';
ctx.fillText(s.desc, s.x, s.y + 22);
if (i < shapes.length - 1) {
ctx.beginPath();
ctx.moveTo(s.x + bw/2 + 5, s.y);
ctx.lineTo(shapes[i+1].x - bw/2 - 5, shapes[i+1].y);
ctx.strokeStyle = i < phase ? '#58a6ff' : '#333';
ctx.lineWidth = 1.5;
ctx.stroke();
}
});
// Code snippet
const code = [
'# 时序注意力 reshape',
'x = x.reshape(B, T, N, D)    # 拆分维度',
'x = x.permute(0, 2, 1, 3)    # B,N,T,D',
'x = x.reshape(B*N, T, D)     # 合并 batch',
'x, _ = self.temporal_attn(x, x, x)',
'',
'# 空间注意力 reshape',
'x = x.reshape(B, N, T, D)',
'x = x.permute(0, 2, 1, 3)    # B,T,N,D',
'x = x.reshape(B*T, N, D)',
'x, _ = self.spatial_attn(x, x, x)',
];
const hl = phase === 0 ? [1,2,3] : phase === 1 ? [4] : [7,8,9,10];
drawCode(code, cx - 220, cy + 50, hl);
ctx.textAlign = 'start';
}

function drawEventQuery() {
const cx = W/2, cy = H/2 - 20;
// Video features
ctx.fillStyle = '#1a3a1a';
ctx.strokeStyle = '#3fb950';
const vfX = cx - 200, vfY = cy - 80, vfW = 150, vfH = 40;
ctx.fillRect(vfX, vfY, vfW, vfH);
ctx.strokeRect(vfX, vfY, vfW, vfH);
ctx.fillStyle = '#3fb950';
ctx.font = '12px sans-serif';
ctx.textAlign = 'center';
ctx.fillText('video_features [B,T,D]', vfX + vfW/2, vfY - 8);
// Event Queries
const nq = 6;
for (let i = 0; i < nq; i++) {
const qx = cx + 100, qy = cy - 80 + i * 28;
const pulse = Math.sin(time * 0.05 + i * 0.8) * 0.3 + 0.7;
ctx.fillStyle = `hsla(210, 80%, 60%, ${pulse})`;
ctx.fillRect(qx, qy, 80, 20);
ctx.fillStyle = '#fff';
ctx.font = '10px monospace';
ctx.fillText(`Q${i}`, qx + 40, qy + 14);
}
ctx.fillStyle = '#58a6ff';
ctx.font = '12px sans-serif';
ctx.fillText('Event Queries [N_q, D]', cx + 140, cy - 95);
// Cross attention arrows
const animT = (time * 0.02) % 1;
for (let i = 0; i < nq; i++) {
const qy = cy - 80 + i * 28 + 10;
const sx = vfX + vfW, sy = vfY + vfH/2;
const ex = cx + 100, ey = qy;
const mx = sx + (ex - sx) * animT;
const my = sy + (ey - sy) * animT;
ctx.beginPath();
ctx.moveTo(sx, sy);
ctx.lineTo(ex, ey);
ctx.strokeStyle = '#58a6ff33';
ctx.lineWidth = 1;
ctx.stroke();
ctx.beginPath();
ctx.arc(mx, my, 3, 0, Math.PI * 2);
ctx.fillStyle = '#58a6ff';
ctx.fill();
}
// Output
ctx.fillStyle = '#fff';
ctx.font = '13px sans-serif';
ctx.fillText('Cross-Attention', cx - 20, cy - 30);
ctx.fillStyle = '#aaa';
ctx.font = '12px monospace';
ctx.fillText('spans = span_head(queries).sigmoid()  # (center, width)', cx - 180, cy + 100);
ctx.fillText('start = center - width/2', cx - 180, cy + 118);
ctx.fillText('end   = center + width/2', cx - 180, cy + 136);
ctx.textAlign = 'start';
}

function drawRoIPool() {
const cx = W/2, cy = H/2 - 20;
// Timeline
const tlW = 400, tlX = cx - tlW/2, tlY = cy - 60;
ctx.fillStyle = '#1a1a3e';
ctx.fillRect(tlX, tlY, tlW, 30);
for (let t = 0; t < 16; t++) {
const x = tlX + t * (tlW/16);
ctx.fillStyle = `hsla(${t*20}, 60%, 50%, 0.6)`;
ctx.fillRect(x + 1, tlY + 1, tlW/16 - 2, 28);
}
ctx.strokeStyle = '#58a6ff';
ctx.strokeRect(tlX, tlY, tlW, 30);
ctx.fillStyle = '#58a6ff';
ctx.font = '12px sans-serif';
ctx.fillText('video_features [B, T=16, D]');
// Proposal highlight
const pS = 0.3, pE = 0.6;
const px = tlX + pS * tlW, pw = (pE - pS) * tlW;
ctx.strokeStyle = '#ff6b6b';
ctx.lineWidth = 2;
ctx.strokeRect(px, tlY - 5, pw, 40);
// Sampling points
const outSize = 8;
const sampY = cy + 30;
ctx.fillStyle = '#fff';
ctx.font = '12px sans-serif';
ctx.textAlign = 'center';
ctx.fillText(`RoI Pool: 在 [${pS}, ${pE}] 区间均匀采样 ${outSize} 点`, cx, cy + 10);
for (let i = 0; i < outSize; i++) {
const frac = i / (outSize - 1);
const srcX = px + frac * pw;
const dstX = cx - 100 + i * 28;
// Arrow from timeline to output
const animP = Math.min(1, time * 0.015);
ctx.beginPath();
ctx.moveTo(srcX, tlY + 35);
ctx.quadraticCurveTo(srcX, sampY - 10, dstX + 10, sampY);
ctx.strokeStyle = `hsla(0, 80%, 70%, ${animP * 0.5})`;
ctx.lineWidth = 1;
ctx.stroke();
// Output token
ctx.fillStyle = `hsla(${i*30+180}, 70%, 60%, ${animP})`;
ctx.fillRect(dstX, sampY, 22, 22);
}
ctx.fillStyle = '#aaa';
ctx.font = '11px monospace';
ctx.textAlign = 'center';
ctx.fillText('双线性插值: feat = w_floor * feat[floor] + w_ceil * feat[ceil]', cx, sampY + 50);
ctx.fillText('输出: [B, N_q, output_size, D]', cx, sampY + 70);
ctx.textAlign = 'start';
}

function drawNMSCode() {
const cx = W/2, cy = H/2;
const code = [
'def temporal_nms(spans, scores, threshold, use_soft, sigma):',
'    order = scores.argsort(descending=True)',
'    keep = []',
'    while order.numel() > 0:',
'        i = order[0]       # 取最高分',
'        keep.append(i)',
'        rest = order[1:]',
'        ious = temporal_iou(spans[i], spans[rest])',
'        if use_soft:',
'            # Soft-NMS: 高斯衰减',
'            decay = exp(-ious² / σ)',
'            scores[rest] *= decay',
'        else:',
'            # Hard NMS: 直接删除',
'            mask = ious < threshold',
'            order = rest[mask]',
'    return keep',
];
const lineIdx = Math.floor(time * 0.03) % code.length;
drawCode(code, cx - 230, cy - 120, [lineIdx]);
// Visual NMS demo on right
const demoX = cx + 150, demoY = cy - 80;
const proposals = [{s:0.1,e:0.4,sc:0.9},{s:0.15,e:0.42,sc:0.8},{s:0.5,e:0.7,sc:0.85}];
ctx.fillStyle = '#fff';
ctx.font = '11px sans-serif';
ctx.textAlign = 'center';
ctx.fillText('NMS 过程', demoX + 50, demoY - 10);
proposals.forEach((p, i) => {
const y = demoY + i * 30;
const w = (p.e - p.s) * 200;
const x = demoX + p.s * 200;
const alive = i === 0 || i === 2;
ctx.fillStyle = alive ? `hsla(${i*100}, 70%, 60%, 0.8)` : 'hsla(0,0%,40%,0.3)';
ctx.fillRect(x, y, w, 20);
ctx.fillStyle = alive ? '#fff' : '#666';
ctx.font = '10px monospace';
ctx.fillText(`sc=${p.sc}${alive?'✓':'✗'}`, x+w+25, y+14);
});
ctx.textAlign = 'start';
}

function drawCaptionDecode() {
const cx = W/2, cy = H/2 - 20;
// Proposal feature
ctx.fillStyle = '#1a3a1a';
ctx.strokeStyle = '#3fb950';
ctx.fillRect(cx - 200, cy - 80, 120, 35);
ctx.strokeRect(cx - 200, cy - 80, 120, 35);
ctx.fillStyle = '#3fb950';
ctx.font = '11px sans-serif';
ctx.textAlign = 'center';
ctx.fillText('Proposal Feat', cx - 140, cy - 58);
// Auto-regressive tokens
const tokens = ['<BOS>', '人物', '走进', '房间', '坐下', '<EOS>'];
const genIdx = Math.min(tokens.length - 1, Math.floor(time * 0.02));
for (let i = 0; i <= genIdx; i++) {
const tx = cx - 80 + i * 65;
const ty = cy - 10;
ctx.fillStyle = i === genIdx ? '#ffd93d' : '#58a6ff';
ctx.fillRect(tx, ty, 55, 25);
ctx.fillStyle = '#0d1117';
ctx.font = '11px sans-serif';
ctx.fillText(tokens[i], tx + 27, ty + 16);
// Arrow to next
if (i < genIdx) {
ctx.beginPath();
ctx.moveTo(tx + 55, ty + 12);
ctx.lineTo(tx + 65, ty + 12);
ctx.strokeStyle = '#58a6ff';
ctx.lineWidth = 1.5;
ctx.stroke();
}
// Cross-attn line to proposal
ctx.beginPath();
ctx.moveTo(tx + 27, ty);
ctx.lineTo(cx - 140, cy - 45);
ctx.strokeStyle = '#3fb95033';
ctx.lineWidth = 1;
ctx.stroke();
}
ctx.fillStyle = '#aaa';
ctx.font = '12px monospace';
ctx.fillText('P(c_j | c_{<j}, h_proposal)', cx, cy + 50);
ctx.fillText('Teacher Forcing: 训练时用 GT token', cx, cy + 70);
ctx.fillText('Inference: 自回归逐 token 生成', cx, cy + 90);
ctx.textAlign = 'start';
}

function drawKeyframeSampling() {
const cx = W/2, cy = H/2 - 30;
const N = 20, sampleN = 6;
const barW = 20, gap = 4;
const startX = cx - (N * (barW + gap)) / 2;
// Frame bars with motion values
const motions = [];
for (let i = 0; i < N; i++) {
motions.push(Math.sin(i * 0.5) * 0.5 + Math.random() * 0.3 + 0.2);
}
// Draw all frames
for (let i = 0; i < N; i++) {
const x = startX + i * (barW + gap);
const h = motions[i] * 60;
ctx.fillStyle = `hsla(${i*18}, 60%, 50%, 0.5)`;
ctx.fillRect(x, cy - h, barW, h);
}
const methods = ['uniform', 'motion', 'cluster'];
const methodY = [cy + 20, cy + 55, cy + 90];
const methodLabels = ['均匀采样', '运动差异采样', '聚类采样'];
const methodColors = ['#58a6ff', '#ff6b6b', '#3fb950'];
methods.forEach((m, mi) => {
let selected = [];
if (m === 'uniform') {
for (let i = 0; i < sampleN; i++) selected.push(Math.floor(i * N / sampleN));
} else if (m === 'motion') {
const sorted = motions.map((v,i)=>({v,i})).sort((a,b)=>b.v-a.v);
selected = sorted.slice(0, sampleN).map(s=>s.i).sort((a,b)=>a-b);
} else {
selected = [0, 4, 8, 12, 16, 19];
}
ctx.fillStyle = methodColors[mi];
ctx.font = '11px sans-serif';
ctx.textAlign = 'left';
ctx.fillText(methodLabels[mi] + ':', startX - 80, methodY[mi] + 12);
selected.forEach(idx => {
const x = startX + idx * (barW + gap);
ctx.fillStyle = methodColors[mi];
ctx.fillRect(x, methodY[mi], barW, 15);
ctx.fillStyle = '#fff';
ctx.font = '9px monospace';
ctx.textAlign = 'center';
ctx.fillText(idx.toString(), x + barW/2, methodY[mi] + 11);
});
});
ctx.textAlign = 'start';
}

const drawFns = [drawReshapeFlow, drawEventQuery, drawRoIPool, drawNMSCode, drawCaptionDecode, drawKeyframeSampling];
function animate() {
ctx.fillStyle = '#0d1117';
ctx.fillRect(0, 0, W, H);
time++;
drawFns[step]();
requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
